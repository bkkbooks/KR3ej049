front:
  text: 序周禮周公所以治天下者無一事不備至於醫師特令上士為之下逮於鳥獸亦有醫以是知百家技藝皆聖人之所創制民生之不可一日無者其為經綸參贊之功至矣今世醫亦有官而四方之為醫者不少如史傳紀載未之或聞欲求平正通達之醫亦不數覯良由學業不精故斯道日晦吾友葉君子雨敏而好學中年頻遭家難多誤於庸工之手慨然有濟世之志廣搜醫籍閉戶十年深造軒岐之奧著述甚富昨以痧疹輯要一種見示伏讀再過其辨證論因折衷中外於前人依違附會之說立為剖斷而論三焦及同身取寸之義發前人所未發尤為名言至理超軼古今可謂濟世之書也可謂傳世之書也愛付於民公諸海內是為序光緒庚寅暮春之初四明北亭李振霆撰序痧疹一證漢魏經方不載唐宋以降亦未有論及者前明羅田萬氏稍稍闡明其義而語焉不詳難執為法近代諸家間有精論多散見痘書之末每與隱疹時麻淆混辨證不清治法多舛苦無專書故也余甚憫焉戊子之冬寒夜挑燈涉獵舊籍不揣固陋鉤往哲之精華抉先賢之奧旨匯而成帙間附一得之愚顏之曰痧疹輯要未敢言有功斯世或於業是科者未必無小補云爾光緒庚寅春葉霖序於石林書屋
  hash: sha256:3a66b99b29c26cc086dc96e98b0e6d0e00201df12d635ee0bc061ba48cbc3ab2
