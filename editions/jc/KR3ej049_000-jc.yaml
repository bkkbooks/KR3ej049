body:
  text: 凡例一是書之輯專論痧疹其痘斑麻隱等證未便涉及惟爛喉丹痧稍有發明然亦略而不詳欲求全義自有陳耕道疫痧草在故不贅述二治病須明經絡若經絡不明如瞽者夜行而三焦一經尤為痧疹伏氣第一關鍵越人以降或有形或無形紛紛聚訟余不憚瑣褻以泰西解體諸書縷晰辨明使數千年幽晦復明庶幾長夜一燈不致暗中摸索三經絡雖明俞穴難考漢唐以後針灸失傳總緣不辨同身取寸之義致議論分歧語多隔膜余折衷諸家暢明經旨泄千餘年失傳之秘固豆疹之津梁實針灸之寶筏四清冷淵消濼二穴為三焦經脈泰西引種之說引其命門伏毒由經絡外達此法與牛豆同倘能推廣行之亦保嬰之一助也五選錄諸家精論當以許橡村首屈一指其餘各有奧義讀者須細心領會勿輕看過六論治雖無剩義惟疑似同異之間病情百變臨證之士惝恍無所適從故選案數十條各法略備其間具治病原委覽者心目豁然遇證之偶相類者用之無疑效可立俟庶免望洋之嘆七書分四卷卷分八篇曰述原曰引種曰預防曰禁忌曰辨證曰論治曰運氣曰選案每有一得之愚附之篇末高明之士起而正之匡其不逮固鄙人之幸亦是書之幸也八古人文字未便割裂前後之間難免拉雜書雖八篇氣則一貫讀者參觀互證可也九是書首重暢明醫理未敢以文害義其重複蕪雜之誚知所不免閱者諒之
  hash: sha256:a331d5fa5e3e4ab960cf50b9edee001a3e870150435fd7234783b1ea642114a4
