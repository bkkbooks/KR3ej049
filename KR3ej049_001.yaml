body:
  text: 卷一述原錢仲陽曰小兒在胎十月食五臟血穢生下則其毒當出故瘡疹之狀皆五臟之液肝主淚肺主涕心主血脾為裹血其瘡出有五名肝為水疱以淚出如水其色青而小肺為膿疱以涕稠濁色白而大心為斑主心血色赤而小次於水疱脾為疹小次斑瘡其主裹血故色赤黃淺也涕淚出多故膿疱水疱皆大血營於內所出不多故斑疹皆小也病疱者涕淚俱少譬胞中容水水去則瘦故也始發潮熱三日以上熱運入皮膚即發瘡疹而不甚多者熱留膚腠之間故也潮熱隨藏出如早食潮熱不已為水疱之類也瘡疹始出之時五臟證見惟腎無候但見平證耳尻涼耳涼是也尻耳俱屬於腎其居北方主冷也若瘡黑陷而耳尻反熱者為逆也聖濟總録論曰小兒稟氣純陽臟腑蘊熱自內出外隨氣熏蒸散於榮衛肌肉之間留連內腠或因飲熱乳或因遇時疫熱氣乘其肌肉嫩弱遂變瘡疹微者其邪在腑發為細疹狀似蚊喙所螫點點赤色俗號麩瘡甚者其邪在臟發為豆瘡狀如豌豆根赤頭白穴出膿水俗名疱瘡皆於未發時先蒸熱如傷寒狀頭痛面赤目黃遍身皆熱腰背疼痛小便赤短大便或溏或澀煩渴引飲甚則譫語其脈浮大洪數者是其證也李東垣曰夫斑疹始出之證必先見面燥腮赤目胞亦赤呵缺煩悶乍涼乍熱咳嗽嚏噴足梢冷多睡驚並瘡疹之證或生膿胞或生小紅斑或生癮疹此三等不同何故俱顯上證而後乃出蓋以上諸證皆太陽寒水起於右腎之下煎熬左腎足太陽膀胱寒水夾脊逆流上頭下額逆手太陽丙火不得傳導逆於面上故顯是證蓋壬癸寒水克丙丁熱火故也諸斑證皆從寒水逆流而作也醫者當知此理乃敢用藥夫胞者一名赤宮一名丹田主男子藏精施化婦人系胞有孕俱為生化之源非五行也非水亦非火此天地之異名也象坤土之生萬物也夫人之始生也血海始淨一日二日精勝其血則為男子三日四日五日血脈已旺精不勝血則為女子二物相搏長先身生謂之神又謂之精道釋二門言之本來面目是也其子在腹中十月之間隨母呼吸呼吸者陽氣也而生動作滋益精氣飢則食母血渴者飲母血兒隨日長皮肉筋骨血脈形氣俱足十月降生口中尚有惡血啼聲一發隨吸而下此惡血復歸命門胞中僻於一隅伏而不發直至因內傷乳食濕熱之氣下流合於腎中二火交攻致榮氣不從逆於肉理惡血乃發諸斑疹皆出於膀胱壬水其瘍後聚肉理歸於陽明故三番斑始顯之證皆足太陽壬膀胱克丙小腸其始出皆見於面終歸於陽明肉理熱化為膿者也二火熾甚反勝寒水遍身俱出此皆出從足太陽傳變中來也當外發寒邪使令消散內瀉二火不令交攻其中令濕氣上歸復其本位可一二服立已仍令小兒以後再無二番斑出之患此內經之法覽者詳之孫東宿曰麻疹浙之呼為瘄子又曰痧子吳地呼為疹子新安呼為麻總為有生初之淫火伏於命門之間命門具太極之理而陰陽五行系焉臟腑之所由也蓋五行一陰陽陰陽一太極也天之與人咸相感通由其通故天寒而人身寒天熱而人身熱也天之癘氣一動則所稟之毒隨感而發陽感之則疹出焉陰感之則痘出焉陽浮而淺故疹易出易斂陰凝而深故痘難出難痂陰陽二劫之毒盡出則向安矣余故曰人之出疹出痘猶蠶之一眠二眠三眠也痘雖出於陰而實成於陽以氣為之固也疹雖出於陰而實借於陰以血為之資也何見之痘非氣行則血不附安得結痂疹非血濟則氣失依焉能收斂斯陰陽升降之理一開必一闔血之附氣氣之依血陰根於陽陽根於陰陰陽互為其根也前人謂痘出於臟不知指何臟疹出於腑不知指何腑而云之也又謂疹出心肺故鼻涕而咳嗽余謂此皆臆度套詞而非有真知一定之見也既曰疹出於腑心肺獨非臟乎按內經鼻為肺之門戶通天氣陽毒上發熱毒熏蒸蓋心肺位尊膈上又肺主毛竅毒從竅出是干於肺而非出於肺也要知痘之與疹皆出於命門之陰陽也霖按痧疹古經方不載宋元以來諸賢著述率多拉雜前明羅田萬密齊始將治法闡明其論胎毒在腑在臟仍屬依樣葫蘆惟孫文垣命門之論允為精當然痧疹之根原雖明有非關命門伏氣其形證似是而非者風隱斑疹之外又有爛喉丹痧一證均當詳考謹列於下庶免混淆風疹初起煩癢搔之隨手壟起成片成塊愈搔愈甚由脾虛血熱感風邪而作治宜調中疏風不可專用風藥隱疹始候如蚊蚤螫齧煩癢無頭粒搔之似腫非腫隱隱然不發胖甚則發熱腹痛此脾有蓄熱更為風濕所中治宜消風清熱較痧疹險證中之皮里隱不同不可牽混按以上二證即巢源所謂邪折於肌與內熱相搏則為軫外臺所謂赤軫如蚊螫煩癢搔之重沓壟起斯即赤白二種之風矢隱軫也斑有色點而無顆粒其狀或如錦文或如雲霞撫不澀指按之暈淺證有陰陽之別陽斑色紫點小者心胞熱也色紫點大者胃中熱也或由溫病或由傷寒或是汗後或是血熱各有其因陰斑色淡紅口不渴脈不洪乃伏寒在下迫其無根失守之火聚於胸中上蒸所致宜各從本病以決死生按傷寒總病論曰冬溫之氣至春夏而發肌肉斑斕隱軫如錦文俗名麻子瘡補亡論曰斑形如丹砂小點又若錦文燦爛此即熱病之斑軫與痧麻迥異者也麻疹發熱不拘三四日以火照之遍身如塗朱之狀此將出之兆也出則細碎皮紅成片如蚊蚤螫齧之跡撫之澀指按之起暈是其證也亦須從面至胸背手足出透以紅潤為佳重者身膨脹眼亦封閉麻色有赤白微黃不同只要紅活最嫌黑陷麻出面目胸腹稠密纏鎖咽喉者逆發不出而喘悶者凶麻疹與痧疹異處初見遍身發麻退後脫皮而治法亦略同方書不載惟景嶽全書有此論治宜參考又有遍身但紅而絶無斑點者謂之火丹亦其類也故痘科中有夾痧夾麻夾丹等證總皆熱毒所致俱當詳辨也按郭白雲所云焦則退皮狀如麩片者即今之麻疹也或問痧麻二證一云命門伏毒一非命門伏毒抑有說歟曰痧疹人人不免或有未痘之先出者痘後仍必復出麻疹則畢世不出者十之八九患此者不過十之一二一為伏藏之毒一為疫癘之氣以此證之夫復何疑麻疹之外又有時痧亦非伏毒乃寒溫失節釀為天行時氣虛人多易感受邪干經絡則身熱有汗咳嗽神安口不甚渴其發始則三五散布繼則赤焮云密自發至退常十餘日兼有便溏沙足而便溏止熱退則胃氣開病將退矣治法身熱咳嗽痧點未達者疏解兼以開肺繼則痧點漸透達而未足或兼泄瀉者仍用疏解不必止瀉痧足瀉即止未足目赤神煩舌絳脈數者疏解兼清熱痧透已足赤焮云密脈象數大舌絳神煩者清火養液痧足漸回熱退胃開而咳嗽未止者輕清理肺其有少陰不藏之人其氣必虛感邪亦重或痧發早回而躁熱不退或神機呆倦腹痛胸滿或鼻煽氣促或液涸舌乾或正虛脈亂此等惡候犯之多危爛喉丹痧古人無此證古書亦無此方近時患此者既多且險總緣風氣寖薄沴癘之邪人易感受初起咽喉腫痛鼻塞噴嚏咳嗽胸悶甚則身痛神呆脈郁心煩等證遍身痧點細碎紅活有汗者輕灼熱無汗肌如紅紙痧隱成片不分顆粒者重若痧色紫滯乾枯喉爛神昏者為毒火內陷之險證矣其論治不外疏達清化下奪救液數法然次第失宜流弊無窮陳靜岩疫痧草言之甚詳最宜詳閲此證傳染易易不可不防王孟英仁術志中載有一方凡見寒溫失序閭閻有此證時可用陳白萊蔔英及鮮橄欖二味濃煎當茶恣飲試之良驗按陳靜岩疫痧草論證論治已無剩義惟辨疫邪所由來一篇歸本於種痘之餘毒未盡此臆度之辭殊不可信餘留心十餘年見患是證者非盡種痘之人不患是證者亦非盡出天行痘之人此其明證徐靈胎曰宋時痘瘡形證治法甚略近日愈變愈重與斑疹絶不相類治亦迥別因知天下之病隨時隨地變化無窮所以內經有五運六氣異法方宜等論為醫者苟不能知天運之轉移及五方之體性終有偏執之處此誠通論也引種泰西方鑑云種疹法先於患者發疹最多處部以鈹針微刺之急將綿一片浸取其血爾後就種者臑上徐徐刺之令血流漓凡一刻頃乃取彼浸血綿貼其疵上直緊綁之放置三日許而後撤去但要其針疵不深不淺一適其宜貼綿間不長不短惟中其時霖按此即泰西牛痘法也由清冷淵消濼等穴引出命門伏毒痧疹與痘證雖有氣血之殊然其理則一可以擇天時察人事較疫癘感召內外之因齊發者不同今牛痘業已盛行未見流弊醫家病家可勿疑二又法取浸血綿一片插入鼻中亦能傳染霖按此即中土種痘法也由此引命門伏毒由臟腑而肌肉雖可擇天時察人事究未若由經絡引出者為穩又法取患者眼淚若鼻涕蘸綿以插入種者鼻內或貼之皮膚亦能傳染又法將患者之親近衣遍摩種者之身體或著之臑腳是亦一良法也霖按此兩節閣中西種痘法脫化出者用涕淚較刺血為尤便但從經絡引出者為善由臟腑引出者究未妥當凡種疹者有八益焉不至陷不治一也無其毒侵肺以發咳嗽二也雖有餘毒無侵入眼耳及他要具三也比較於天行則質善而證順四也縱發焮腫大熱煩悶等其證大率輕易五也天行之疹者間易至勞狀至於種者則決無有其患六也病中或發嚏或多淚然至疹痂乾燥乃即止七也於種痘法則疵瘡膿潰動經久於此法則其疵速愈八也霖按手少陽三焦經正脈起於小指次指之端上出次指間循手表腕出臂外兩骨間上貫肘循臑外上肩交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其清冷淵消濼二穴在肘上臑外正三焦經脈處也痧痘為命門伏藏胎毒考命門背𦛗七節間之穴為相火之宅心包為相火之臟三焦則相火之腑也由三焦經脈處引達命門伏毒所謂同氣相求其理顯然又何瞻顧疑懼之有人為三才之一本與天地相肖督脈統一身之陽任脈統一身之陰此即人身之乾坤亦即九一二數之相表裡也肺與大腸屬兌金胃與脾屬艮土亦即四六二數之相表裡也心與小腸屬離火膀胱與腎屬坎水亦即三七二數之相表裡也心包絡三焦屬震震陽木即為相火膽與肝屬巽木亦即八二二數之相表裡也震是陽木何以為相火火無體以木為體說卦傳謂震為雷為龍雷之火豈不象人身之相火乎不但包絡三焦是震卦即右尺命門亦是震卦人自不察耳此乾坤六子以配人身之定體命門為水中真火先天胎毒伏藏命門如雷火潛於水底遇時則發發即燎原豈若取同氣之三焦由經絡外達不傷臟腑之為善乎或問命門之所以屬震卦亦有說乎命門者背𦛗七節間之穴也背𦛗二十一節三七二十一命門當其七節之間正猶震卦一陽在二陰之下其象最肖此乾坤始交一陽初動為生育之根也前對臍穴名神闕猶北極之對南極也位居水中其氣則真陽之氣為水中之火故為三焦包絡相火之原三焦包絡經脈之流行皆相火之流行也命門猶宮舍經脈猶道路皆統之於相火皆可屬之於右尺而七節間之一陽其為震卦不甚顯然哉痘疹為命門伏毒由三焦經脈引而外達其理甚明恐株守成法者固執不通其變故不憚反復再申其義惟閲者諒之昔賢論三焦一府紛紛聚訟莫衷一是或謂無形或謂有形或言是一或言是二甚則云為腎旁之脂者雖明如張隱菴遊移其詞亦不能指為何物考臟腑之學西士言之最詳觀全體通考三焦即所謂腹包膜也其膜包繞全腹上通巔頂下行膀胱中有脂膜橫於肝胃之間惟遮陰道護子宮則男女稍異耳內經謂上焦如霧中焦如漚下焦如瀆豈虛語哉或問腹包膜即三焦亦有證據否曰觀其包二腸遮兩腎正當七節之間命門部位既藏水中真火即為相火之宅居其位行其權此膜即為相火之腑考心肺之下肝胃之上有膈膜一層其形薄如細網上與心包絡之下面相連下與此膜之上層黏續氣脈通貫則包絡即為相火之臟由膈膜上通腦筋即經所云上焦如霧是也中有薄膜兩層包肝裹胃即經所云中焦如漚是也繞膀胱遮陰道以行其氣化即經所云下焦如瀆是也以此證之腹包膜即三焦夫復何疑若求此膜功用全文自有通考在篇幅有限故不縷述泰西引種痘疹其法稍有不同種痘用鈹針挑刺臑外皮及次皮不令傷肌出血以痘膿留著皮間種疹刺令見血俟血流盡始將疹血綿貼其疵上此中有陰陽互根之至理存焉近人種牛痘不獨三焦經穴不明而血附氣氣依血之義茫然不解無怪乎每多流弊也引種諸書僉云刺臑外皮而不言清冷淵消濼二穴者蓋嬰兒由肩至肘長僅四五寸每種三五粒則二穴亦在其中況臑外皆三焦經脈所過之地然究不若點此二穴引種為善是經穴之不可不考也甲乙銅人明堂諸經載清冷淵穴在肘上二寸伸肘舉臂取之消濼穴在肩下臂外開腋斜肘分下胻取之觀此二穴皆在臑外之證也考取腧穴是針灸家要事而漢唐以降針灸失傳為不明同身取寸之義僅以患人之中指中節取寸便為獨得心傳殊不知瘦人指長而身小則背腹之橫寸豈不太闊肥人指短而身長則背腹之橫寸豈不太狹有身長指長而頭小者則頭間之寸豈不嫌長有身短指短而頭大者則頭間之寸豈不嫌短似此肥瘦長短之差訛安能準的所謂同身取寸者必同其身體而取之也縱觀諸家惟東醫山崎子政骨度折量一法深得先聖奧旨其法以靈樞骨度篇尺寸為主再量人身尺寸隨取而折之自無長短肥瘦之差訛假如靈樞骨度篇雲肩至肘長一尺七寸而患人由肩至肘量五寸一分以三摺合之所云某穴至某穴一寸者僅得三分識此同身取寸之義明而針灸之法不致失傳矣預防朱丹溪曰痘疹初出時或未出時見時人有患者宜預服此藥多者令小重者令輕以絲瓜近蒂三寸連皮子燒灰存性為末砂糖拌勻干吃入硃砂末更妙霖按近世所傳稀痧疹方用經霜老絲瓜一個風乾除夕日在新瓦上煅灰攤地出火氣研末以百沸湯沖服每歲如此服至三四次云小兒永不患痧疹矣此亦丹溪之遺法也萬密齊曰春溫夏暑秋清冬寒此四時之正氣也冬應寒而反溫陽氣暴泄火令早行人感之者至於來春必發瘡疥未出痘疹者必感而出雖曰胎毒未有不由天行者故一時傳染大小相似但見痘疹之出宜先服消毒保嬰丹代天宣化丸以預解之可使毒徹不為已甚也消毒保嬰丹纏豆藤或黃豆或緑豆梗上纏繞細紅絲者是於八月間生氣日採之陰乾聽用一兩五錢黑大豆三十粒赤小豆七十粒新升麻七錢五分山楂肉一兩荊芥連穗五錢防風去蘆五錢當歸酒洗五錢赤芍藥七錢五分黃連去枝梗五錢生地黃酒浸焙一兩川獨活五錢甘草生五錢桔梗五錢辰砂別研水飛一兩牛蒡子炒一兩老絲瓜隔年經霜者二個取連藤蒂五寸燒存性上一十七味各研細末和勻用淨砂糖拌丸如李核大每服一丸濃煎甘草湯下代天宣化丸甘草甲巳年為君土黃芩乙庚年為君金黃柏丙辛年為君水山梔丁壬年為君木黃連戊癸年為君火連翹佐山豆根佐牛蒡子佐先視其年所屬者為君次四味為臣君藥倍用臣藥減半佐視臣又減半共為極細末於冬至日修合取雪水煮升麻汁打麵糊為丸辰砂為衣竹葉煎湯下嘉靖甲午春痘毒流行病死者十八九乃一厄也時有預服三豆子湯絲瓜辰砂散者凡方書所載預解痘毒之法靡不用之未見效者余竊思痘疹疫癘之毒因歲運災眚之變難以藥解而人事未盡又不可諉之天數也於是檢閲古方乃於韓氏醫通得五瘟丹以五運為主喜曰此解毒神藥也依方修合施售於人但報之者莫不輕疏人皆神之因命之曰代天宣化丸張隱菴曰夫稀痘疹之方法雖多未有如元兔丸之理甚精微驗若桴鼓蓋痘疹乃先天之毒天一生水地二生火水火相濟陰陽互交乃水中之火毒也元乃水天之色參者參也參天地之化育者也菟絲子一名女蘿爾雅名為玉女蓋兔乃月魄純陰之物故有玉女之稱抱朴子云菟絲初生之根其形如兔握割其血以和丹藥立能變化神異之品也夫凡物得清涼水土之氣而後能發芽兔絲秉純陰之性故得火暖而絲長此物理陰陽之妙用也內經云骨者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也是肺腎天水之相通也肺屬天玄參具水天之性色能於水中以清發其天花菟絲有陰陽之妙用能於至陰之中而透其陽毒是以嬰兒在百日內與此丸服之或服至三歲則毒盛者稀而毒微者不出矣即熱毒盛者亦無險逆之虞同邑盧子由先生五十無子得一種子奇方即生二男皆為痘壞蓋種子方中不無多熱藥耳後復生子皆以玄菟丸服之至六十有五連舉六男六女俱已長成皆不為痘疹所壞玄菟之功效豈淺淺哉盧氏玄菟丹菟絲子八兩玄參四兩不經鐵器各為末砂糖調服初生者一錢量加至一兩葉子容曰菟絲養先天之水玄參清腎家之火一養一清則痘疹之毒自減童年久服不特稀痘且免癆瘵葉子容曰三豆湯為扁鵲之方黑歸腎以制相火赤歸心以制君火緑歸陽明以制胃火三豆皆涼品而寓生髮之意常服而不嫌其峻烈功緩而實取其穩便未出痘疹時及將出發熱時皆可服之三豆湯黑大豆赤小豆緑豆各一升生甘草三兩先將三豆淘淨甘草銼碎用臘雪水同煮至豆爛為度去甘草取豆曬乾入汁再浸再曬以汁盡曬乾瓷瓶收貯逐日取一二兩用長流水兩大鐘煎成一鍾面東溫服或以人中黃易甘草加入經霜老絲瓜一個同煮更妙霖按稀痘疹諸方率多苦寒之品久服固妨脾胃將出又恐冰毒三豆湯一方平善無弊然究未若玄菟丹之義精理微效如桴鼓惟因疫癘流行則代天宣化丸又可參因但避風遠穢節飲食適寒暄為預防之第一義不可不知也禁忌辨證萬密齊曰凡出疹熱起至收完但看右手一指脈洪大有力雖有別證亦不為害此定存亡之要訣也霖按此即陽證得陽脈之義若細軟無力則陽證得陰脈也景嶽以診得陰脈宜速救元神用溫補托法參酌治之是矣然有熱毒深伏於內不能透發於外假寒真熱之證肢冷麵青六脈沉伏細數若誤用溫補禍不旋踵痧疹陽邪熱證俱多安危之機須細心體認也痧為陽毒首先干肺肺主氣屬金熱邪傷氣舌上多見白苔金之色也治當清肺若無虛寒的證誤治則殺人事矣不獨痧疹為然夏日忽患咯血俗名暑瘵證亦見白苔宜清絡熱同一義也司命者豈可忽諸瘄疹全書云疹之出也有熱三日而即出者有熱四五六日而出者有熱而涼涼而復熱者有一日寒熱往來數次而出者有熱一日涼一日復涼復熱至五六七日而出者大抵五日前出者多輕五日後出者多重毒少則熱少毒多則熱多熱少則早而易出熱多則遲而難出大有分別七日不出面青鼻煽喘急生痰名曰悶瘄不治凡瘄先從肚腹發起而後及於四肢者順先從手足發起而後及於肚腹胸背者逆凡瘄於皮膚上發出成粒者順以手摸之礙指尖紅者吉瘄上重疊起瘄者吉蓋瘄以起發為上也痘後瘄者吉瘄後痘者凶蓋痘後出瘄則腠理疏而毒易出無形之毒氣易泄也瘄後出痘則陰血虧而漿難灌有形之營血難成也此言痘後出瘄因其腠理疏通毒氣易出故吉若瘄後出痘則一日三潮三日九潮往來進退勞動陰血則血虛血虛而責其灌漿也難矣痘瘄一齊出者所謂瘄夾痘也先治其瘄而後治其痘瘄潮一日忽夾痘苗所謂瘄噴痘痘苗初見忽又夾瘄所謂痘噴瘄治宜先發瘄潮不論痘苗三日潮完痘始蒸長但治痘藥中必須滋養陰血切不可用參耆甘芷朮桂溫補之藥蓋瘄無補陽法也若痘出一日至四五日內忽然瘄出痘中所謂瘄合痘也發表起痘之藥皆同瘄發則痘自蒸長若痘出六七日內漿未灌或灌未足忽然瘄出痘中所謂痘離瘄也若助痘漿則瘄悶而難出若攻瘄潮則痘靨而不漿既欲其潮又欲其漿正所謂陰陽困憊氣血奔命者是也證必上喘痰壅下瀉膿漿神昏厥逆百無一生若痘少兒大見瘄不失時機連發瘄潮痘雖遲滯至三日潮完痘復蒸漿回合以其元氣壯實等瘄潮完痘乃自漿自靨而愈此蓋百中一二也若痘多兒小元氣怯弱至此用補則瘄閉悶不補則痘癢塌施治兩難故曰逆也若痘至九日十十一十二日後漿雖回而痂未落忽然出瘄所謂瘄趕痘也治宜微發表不可大發汗如喘急無汗而瘄不起者麻黃亦可權用如服汗藥皆成水泡亦不妨至瘄後復結痂而落宜多服滋陰養血藥若痘痂落盡而出瘄者痘後瘄也瘄潮已完而痘出者瘄後痘也詳見前章凡瘄五液兼見者順二三液不見者逆一液不見者死汗為心液淚為肝液吐為脾液涕為肺液瀉為腎液瘄發於陽火毒炎灼五液皆屬水水能制火是以輕也遍身乾燥心液竭也目無眵淚肝液少也乾嘔無物脾液乏也鼻煽無涕肺液干也大便祕結腎液虧也五液不全瘄後必有餘毒心無液者發熱肝無液者驚搐脾無液者牙疳肺無液者咳嗽腎無液者下利五液皆無不治之證如少一二液者當以藥救之五液以多為妙夫瘄之難出也為有六因遂成六閉焉一曰毒閉因時氣惡厲毒盛發熱久不出也宜挑頂血及手足血服解毒化毒之藥以發之二曰肌閉因兒之肌肉堅厚難出宜用洗擦刮法服松肌透表之藥以達之三曰腸閉因臟腑熱甚大便不通則經絡閉塞難出宜用導法服滋陰潤腸之藥以通之四曰寒閉因天氣嚴寒風雪凜冽致令腠理閉密血脈凝澀邪滯難出用胡荽噴床帳西河柳燒房中服麻黃湯以表之五曰食閉因將出之時恣啖飲食食滯滿閉胃口停滯不能運動氣血而送瘄外出宜用探吐法摩尉法服寬中化食之藥以消之六曰病閉因兒有本病復感時氣出瘄為本病而滯瘄難出者多矣如夾食夾驚雜疹雜瘡損傷懷妊等證皆能滯瘄難出宜照本證兼治之或從其急者先治之瘀血喘滿不得不吐此先治本病之急痘漿見瘄發瘄為先保元大忌瘧疾見瘄治瘄為急截瘧大凶此治瘄之急務也謹此六閉者吉犯此六閉者凶痘瘄皆有皮里隱皮里疔夫痘之皮里隱身體頭面上先見十數點紅紫痘父母不知以為痘止此矣以火照之皮里隱隱如菜子密布宛如疥瘡初出細密出皮里隱隱成片皮痘一色有影無形此謂皮里隱亦有身面上不見紅點神昏煩躁而成皮里隱者此謂悶痘驚搐發喘而死父母不知其為何病而死也瘄之皮里隱神昏厥逆面青煩躁氣喘鼻煽瘄全不見以火照之頭面上皮肉內隱隱有紅點其頭面皮上微微有紅光出沒或如燈光瞬息即沒旋有旋無日有數次三日不起必致喘閉而死父母不知其為何病而死也此證必須細心辨視確切急用大劑麻黃救之若脈洪身熱者麻黃加石膏湯救之痘瘄皆有皮里疔夫痘瘄未出或微見標皮肉中有硬塊或紫或青或黑摸之礙手此謂皮里疔也百無一生凡痘瘄之皮里隱能辨認急治十中可活一二若遲延失治毒氣凝聚變成皮里疔便無生理矣瘄漸出及正潮時因風寒不謹致令腠理閉塞氣血阻滯瘄即隱沒者總名悶瘄也瘄出二日因風寒早沒者證猶稍輕瘄出一日而早沒者證必重隨出隨沒乃危證也致令咳嗽喘急面青鼻煽痰壅聲嘶神昏迷悶身涼無汗輕者三四日重者一二日皆喘急而死此與皮里隱不同皮里隱者瘄疹全未見點隱隱於皮膚之下面上如電影燈光忽來忽沒人全不知也若已潮見瘄因風隱沒但分一日二日三日輕重之不同治法當與早沒之時急與麻黃髮表湯兼熏洗刮擦法倘得微潮一二次喘定身溫方有生機金鏡録云痧疹數潮後見風早沒未清爽者宜消食飲加散表之藥雖不復出亦尋愈矣此謂數潮而言也若止一二潮而早沒者其變證必凶急當委曲調治如一二潮而止證必凶惡身體如常此必有夜潮腹潮汗潮減潮經潮産潮之類不可強與發汗變生他證謹按因風早沒之證急治十全七八如使遲延不可救矣瘄不收斂其證有二一曰血不歸經一曰血死肌表瘄疹九潮已完血回經絡則頭面身上血跡漸次而退若紅久不退即是血不歸經若血跡變為青紫色即是血死肌表也如血不歸經用解毒清涼斂陰收血之藥宜養榮解毒湯如血死肌表用活血涼血溫經解毒之藥若瘄出三日後不沒者乃餘毒內實也宜四物湯加清利之藥則熱自解而瘄自消矣若血死肌表色變青紫黑久則身熱發腫其青紫黑色之處從外潰爛膿水淋漓痛癢不常宜服清肌化毒湯洗以苦參湯敷以三黃散若潮止一二次外冒風寒隨出隨沒色變青紫身冷不爛必發喘急不治必死急宜大發表邪以麻黃救急湯治之婦人經水後五日六日發熱見瘄則血室空虛邪氣乘虛入內重則妄見妄聞如憑鬼祟晝則明瞭夜則譫語此謂熱入血室輕則常發夜熱久成瘄怯宜服清熱養血之劑主以加味逍遙散調經養營丸必得經調復行方無後患也若婦人行經七八日見瘄或見瘄時即便行經皆為熱入血室二者不同治法亦異如經盡後見瘄此熱邪乘虛入內也令人多發夜熱或午後面紅身熱久之則成骨蒸勞熱治當養血清熱宜逍遙散如見瘄時行經此瘀血蘊結於內也令人寒熱如瘧發作有時治當消瘀敗毒宜桃仁紅花湯總以經水復行為第一義也李豆仙曰瘄之出也氣載之血送之達表則粒粒如麻甚則疊腫多則成片一日三潮從頭而起漸漸身體以及四肢潮時瘄腳粒粒腫起皮上三日九潮方完潮則氣送毒從毛竅而散血留肌表漸歸經絡紅點以漸而退頭面先潮者色先淡身腹後起者色後退頭面多者吉少者凶色赤者吉紫黑者凶正潮正潮者早午晚一日三潮三日九潮人盡知也瘄屬陽陽從陽類故不潮於夜之陰而潮於日之陽此正潮也夜潮瘄有夜潮不可不知蓋瘄本屬陽然其赤點乃陰血也男子陽盛故潮於日之陽女子陰盛故潮於夜之陰有男子夜潮者氣不足而血有餘也有女子日潮者血不足而熱毒盛也兒出瘄時為父母者必夜觀之如不知夜觀則九潮已過猶以為未潮九潮已足猶以為未足疏表之藥發表之物猶然不徹有致血不歸經皮膚腫而色青紫者有致吐血便血者有致汗多亡陽者有致中風發痙者為父母者不可不知腹潮小兒瘄疹乃天行熱毒挾少陽相火蘊蓄於胃胃主肌肉故熱毒之邪熏蒸於肌肉先發熱數日然後透泄於皮膚粒粒如蛇咬狀乃瘄疹也痘出於五臟瘄出於六腑六腑者專指胃腑而言也既云出於胃腑何腑臟多受其邪胃土傳肺金以前來者為實邪也胃邪傳肺是腑傳臟如毒邪陷伏不出者死不治矣有止發於肚腹而頭面手足一無所見一日三潮三日九潮惟在肚腹粒粒起綻緣小兒氣血孱弱不能周行遍體故止在肚腹出瘄發潮瘄根既出他處雖無不足慮也若用重劑取汗則虛脫之禍立至矣可不慎哉目潮瘄潮有從眼白珠先紅頭面隨紅蒸熱一片通紅直待潮過熱清紅色漸退再潮復然此陽毒之邪交併於六陽也六陽皆聚於頭面瘄毒出於胃腑運於任脈交併於六陽則目睛裹赤頭面通紅潮時令人煩躁不寧甚則不省人事宜以化毒飲化斑湯加減治之斑潮斑潮者瘄發潮時遍身起雲頭斑也潮過則退再潮復然此胃腑毒熱太甚壅遏而然宜以化斑湯加減治之若潮過不退者不治之證也纍潮纍潮者瘄發潮時遍身纍纍如疙瘩狀潮過稍平再潮復腫此熱甚兼風宜以大連翹飲治之隱潮隱潮者潮時見赤點於皮膚之上潮過即沒毫無點跡與平人同此乃血和而毒不甚故未潮則隱伏於皮膚之中既潮則發現於皮膚之上矣若無惡候宜從輕治不必重劑鬧潮鬧潮者瘄發潮時證見狂亂不寧甚則譫語目不識人潮過則神清如舊再潮復然此熱毒蘊於胃臟宜涼膈散加減以清之大便祕結少加大黃以通之或用導法蚯蚓酒洗去泥搗汁將藥煎好入蚓汁數匙在內最妙口鼻衄血多者名陽毒瘄也磨犀角汁入藥最妙汗潮汗潮者見瘄後止得一二潮余則早午晚當潮時不見紅點止見身熱腮紅江泚泚汗出而已此因天稟虛弱陰血不足或緣病後氣血兩虛是以微潮一二次潮亦不盛萬不可以為潮不足妄用麻黃重劑致令汗多亡陽變生中風驚風發痙發厥之諸危證也慎之減潮減潮者不足之潮也瘄之常例三日九潮今止一日三潮者有二日六潮者有二三日總計止得四五潮者此乃瘄毒原輕或因天行時氣和平如小兒皮嫩五液俱全身安證和者亦無害也劫潮劫潮者命在危急激得一潮即可回生瘄疹初出潮時因風早沒致令咳嗽痰喘面青鼻煽胸膈迷悶三日已過危在旦夕急用麻黃髮表湯或三酥餅蟾龍錠還元復氣丹劫得微微一潮瘄毒從汗孔而出不致內攻矣若大便膿血神昏不省者逆候也經潮經潮者當分經前經後凡經後三四日發熱見瘄此血室空虛與傷寒熱入血室同重則潮時妄見妄聞如有鬼祟輕則夜熱久成疳勞服藥調治月經復行則無羌矣宜用清熱養血之劑若染時氣發熱咳嗽噴嚏三日起至七八日不論已潮未潮一遇經行毒從血化宜服解毒養血之品産潮産潮者孕婦發熱正在潮時熱極不安其胎必下胎下熱退而瘄愈蓋熱極則傷胎元胎下則毒從血化瘄愈竟不潮矣産後雖有熱象切勿妄用涼藥恣食寒物只宜平調氣血為要弄潮弄潮者奪先聲也一日三潮早午晚熏洗服藥必在將潮未潮之先以激其怒若已潮過有何益乎故瘄將潮時令兒不得安睡先熏洗其面隨洗手足既飼之以湯飲隨灌煎藥更相搬弄以俟其潮故謂之弄潮弄潮兒必啼哭怒泣則內有以激其氣更加熏洗刮擦則外有以助其勢內外夾攻瘄無不潮矣保嬰集云瘄出潮時五液俱全則經絡宣通無有留邪若五液不足各有餘邪也汗不足則發熱涕不足為鼻淵淚不足則為珠管睛珠起星吐不足則為牙疳瀉不足則為腸澼此皆瘄毒餘邪當隨證而治之青囊集云瘄出之際為風阻遏不能全收者即當服疏散肌表之劑則瘄疹自退矣若色變青紫此熱毒內攻也攻於脾則嘔吐攻於胃則不食攻於肝則筋急遍身疼痛攻於心則舌黑麵黑神昏譫語攻於肺則喘促搖頭掣手甚則鼻塞舌乾唇焦不省人事此皆惡候也如或身熱小水短赤神不昏胸不突腹不脹庶或可治也保嬰集云肺受毒則脹壅喘急脾受毒則嘔吐困倦胃受毒則滿悶不食肝受毒則目閉不開心受毒則語言不清腎受毒則黑陷而不能救矣霖按瘄疹全書及李豆仙諸論治法未淳然辨證處細針密縷發前人所未發學者宜細心參玩也
