body:
  text: 卷二論治上聖濟總録云小兒瘡疹審得其證速疏利臟腑然亦須詳審若大便已利瘡已出者皆不可疏亦不可汗若發其表則瘡空開泄更增斑斕倉公扁鵲常用油劑草劑其法最妙大率湯劑之用所以透肌和里開通中外使疹毒通快不致壅瘀去其邪毒乃得痊差然食乳嬰孩與童子瘡疹治法不同嬰孩之病唯宜調節乳母令氣血清和乳汁通利最為要法若初斷乳兒則以湯劑和其陰陽調其榮衛既差之後尤宜利其臟腑以去其餘毒此治瘡疹大法紫草湯方治斷乳兒並童兒患疹痘候初覺多似傷寒面與四肢俱赤壯熱頭痛腰脊疼足厥冷眼黃赤脈浮洪至數數大不定小便赤少大便多祕才覺四肢色候及脈俱是疹痘疾未攻皮毛穴出者便可以服餌和勻臟腑疏泄逐下藥按倉公論云可服油劑不可用燥藥並冷藥若疹已結在皮毛穴處微微出即不可疏泄或疹出太盛竇穴膿水者卻可疏利也或未與疏轉即急服紫草湯紫草二兩以百沸浸草用物蓋勿令泄氣凡二月至百日孩服半藥注子五七月兒服一藥注子一二歲兒服半合三四歲兒服一合疹雖出其勢亦輕常服無妨生油湯劑治兒臟腑伏熱未成疹子四肢微覺有熱食物似減頭髮干直額上微熱用此方生麻油一鍾令如人體溫以熱水一小鐘放入油內不住手攪令水盡如蜜夜臥時二三歲服二蜆殼五七歲三蜆殼十歲以上兒三大蜆殼大人服三合食良久與服服了臥時如三五服後大小便利肌熱退則疹痘不復發也霖按近世所傳治痧疹發不透而氣喘者急用芝麻五合滾水泡之乘熱熏頭面即復出謂有起死回生之功蓋一由臟腑利毒下行一由皮毛髮毒外出用法不同其義則一萬密齋曰痘疹皆胎毒所發毒者火也故痘子大而焮腫者少陽三焦火也陽道常饒故大而腫疹子小而碎密者少陰心火也陰道常乏故小而密三焦水穀之道路脾胃主納水穀治痘專以脾胃為主心肺屬陽而位乎上心火旺則肺受之治疹專以肺為主觀其咳嗽者火炎則肺葉焦舉也鼻流清涕者鼻為肺之竅以火鑠金而液自流也目中淚出者肺熱則移於肝肝之竅在目也或手掐眉目唇鼻及面者肺熱證也瘡疹之證其初發熱與傷寒相似但疹子則面頰赤咳嗽噴嚏鼻流清涕目中淚出呵欠喜睡或吐瀉或手掐眉目鼻面宜用升麻葛根湯不可作傷寒妄用汗下也汗之則增其熱為衄血為咳血為口瘡咽痛為目赤痛為煩躁為大小便不通下之則虛其里為滑泄為滯下經曰必先歲氣毋伐天和言不可妄汗下也如手足梢微冷惡寒而無汗面色青慘而不舒左額有青紋者傷寒之熱也手足梢微溫發熱有汗面赤而光者傷風之熱也並宜惺惺散發散之目胞腫而右頰有青筋發熱而頭額腹肚最甚或兼嘔吐腹疼者傷食之熱也備急丸下之面色青紅額正中有紋手掌心有汗時作驚惕手絡脈微動而發熱者此驚熱也瀉青丸牛黃清心丸主之身熱而倍能食唇紅頰赤大小便祕脅下汗者此風熱也宣風散主之已上諸熱久而不去內外感發則所蘊瘡疹之毒亦能乘間而出矣升麻葛根湯解發痘疹之良方葛根升麻甘草白芍藥各等分上銼細水一盞煎七分去滓溫服無時惺惺散解發痘疹良方人參桔梗甘草炙白茯苓栝蔞根白朮各等分細辛少許上為末每服二錢水一盞入薄荷葉五片煎七分溫服不拘時候一方有防風川芎備急丸木香二錢五分大黃牽牛末各五錢上為細末神麯糊丸緑豆大每服五七丸食前山楂煎湯下瀉青丸治肝熱作搐良方羌活大黃煨川芎當歸防風山梔仁龍膽草各等分上為末煉蜜和丸雞頭子大每服半丸至一丸竹葉湯同沙糖水化下牛黃清心丸治心熱神昏牛黃二分半辰砂一錢五分黃連五錢生鬱金二錢黃芩三錢山梔仁三錢共研細末臘雪水調麵糊為丸如黍米大每服七八丸燈芯湯送下宣風散治黑陷裡實以代百祥丸牛李膏檳榔二個陳皮五錢甘草五錢牽牛四兩用半生半炒取頭末一兩上為末三二歲蜜湯調下半錢以上一錢食前服疹喜清涼痘喜溫暖此法人皆知之然疹子初出亦須和暖則易出所以發苗之初只要發出得盡則毒便解非若痘必苗而秀秀而實而後毒解也痘子成實之時若大溫熱則反潰爛不收是痘之後亦喜清涼也故治痘疹者無過熱無過寒溫涼適宜陰陽自和是為得之疹子只怕不能得出若出盡則便毒解故治疹子者發熱之時當察時令寒暄以藥發之如時大寒以桂枝葛根湯發之大熱以升麻葛根湯方見前合人參白虎湯發之不寒不熱以荊防敗毒散發之如兼疫癘之氣以人參敗毒散發之如盡一劑不出再作本湯發之外用胡荽灑以苧麻蘸酒遍身戛之務令亟出如三四作更不出加腹中脹痛氣上喘促昏悶譫妄者必死證也桂枝葛根湯桂枝葛根升麻防風赤芍藥甘草各一錢上銼細加生薑三片淡豆豉一錢水一盞煎至七分去渣溫服無時人參白虎湯又名化斑湯解斑疹良方人參一錢知母三錢甘草一錢石膏五錢糯米一合上銼細水二盞煎待米熟去渣溫服無時荊防敗毒散疹痘之發散藥也荊芥穗柴胡甘草人參桔梗川芎青防風茯苓枳殼前胡羌活獨活上銼細加薄荷五葉水一盞煎七分去渣溫服人參敗毒散解疫癘發痘疹之良方又主腰痛四時通用羌活獨活前胡柴胡川芎枳殼茯苓桔梗人參各等分甘草減半上銼細加生薑三葉水一盞半煎至一盞去滓溫服無時一方加薄荷少許胡荽酒治倒陷胡荽四兩切以好酒二盞煎一兩沸入胡荽用物蓋定再煎勿令泄氣放冷每吸一兩口微噴從背至足遍勿噴頭面病人常令聞荽氣發熱六七日以後明是疹子卻不見出此皮膚堅厚腠理閉密又或為風寒襲之曾有吐利乃伏也急用托裡發表之劑麻黃湯去杏仁加蟬蛻升麻外用胡荽酒方見前散麻刮之如一向未更衣者毒甚於里伏而不出河間涼膈散加牛蒡子主之發之解之再不出者死證也麻黃湯麻黃杏仁甘草各等分石膏倍用上銼細加臘茶葉一錢水一盞煎七分去渣不拘時服一方無石膏有桑白皮河間涼膈散解痘疹表裡俱熱純陽無陰之豆大黃朴硝甘草各五分連翹一分梔子黃芩薄荷各一分半淡竹葉五片上銼細作一服水一盞煎八分去滓入蜜一匙和勻服疹子初發熱時未見出現咳嗽百十聲不已上氣喘氣面浮目胞腫時臥時起此毒火內蒸肺葉焦舉宜甘桔湯合人參白虎湯方見前去人參加牛蒡子薄荷葉主之甘桔湯解咽喉之良方甘草二錢桔梗一錢上銼細水一盞煎七分去渣食後溫服疹子發熱或自汗出或鼻衄者不須止之亦發散之義故汗者毒從汗散衄者毒從衄解但不可太過如汗太多人參白虎湯方見前合黃連解毒湯主之衄太多玄參地黃湯主之黃連解毒湯此解火毒痘疹通用方黃連黃芩黃柏梔子各等分上銼細水一盞半煎至一盞去渣熱服玄參地黃湯治痘疹衄血玄參生地黃牡丹皮梔子仁各一錢半甘草升麻各五分白芍藥一錢上銼細加炒蒲黃半錢水一盞煎七分去渣溫服疹子發熱吐利純是熱證不可作寒論乃火邪內迫上焦多吐下焦多利中焦吐利並多自利宜黃芩湯吐利宜黃芩加半夏湯自利裡急後重者宜黃連解毒湯方見前合天水散主之黃芩湯治協熱而利黃芩一錢半甘草炙一錢白芍藥六錢上銼細加大棗二枚水一盞煎七分食前溫服黃芩加半夏湯即前黃芩湯加半夏二錢生薑一錢天水散治痘乾燥而痛白滑石四兩甘草一兩共為細末白湯調服或用塗痘子甚佳以蜜水調刷之痘疹咽痛亦是常候乃毒火上熏而痛也勿作喉痹同論妄用針刺喉痹內作癰腫故宜針決去惡血痘疹只是咽乾作痛宜甘桔湯方見前加牛蒡子或射干鼠黏子湯細細咽之射干鼠黏子湯治咽喉痛射干一兩鼠黏子四兩炒香甘草升麻各一兩上銼細散每服二錢水一盞煎服疹子渴喜飲水純是火邪肺焦胃干心火內亢故也初發熱渴者升麻葛根湯方見前加天花粉麥門冬渴甚者人參白虎湯方見前合黃連解毒湯方見前主之痘瘡貴三四次出謂出勻瘄疹貴一齊湧出謂出盡疹子只要得出便輕減以火照之遍身如塗朱之狀此將出之兆出形細密與痘瘡密者相似但疹子隨出隨沒非若痘子之以漸長大也出形鮮紅與傷寒發斑相似但疹子粒粒成瘡非若斑子皮紅成片如蚊蚤之迹也痘疹之色不可同論大抵痘子怕太紅皮嫩易破必生瘙癢疹子喜通紅疹發於心紅者火之正色也若疹色淡白者心血不足養血化斑湯主之色太紅焰或微紫者血熱也或出太甚者並宜大青湯主之黑者死證也養血化斑湯治白疹當歸身生地黃紅花蟬蛻人參各等分共銼細水一盞薑一片煎六分去渣溫服無時大青湯治斑疹火毒良方大青生地黃玄參石膏知母甘草木通地骨皮荊芥穗各等分共銼細水一盞淡竹葉十二片煎七分去滓溫服不拘時疹子出沒常以六時為準假如子後出午時即收午時出者子時即收乃陽生陰成陰生陽成造化自然之數也凡此旋出旋收者輕若一出連綿三四日不收者乃陽毒太甚宜大青湯方見前解之逡巡不出者乃風寒外束皮膚閉密也宜荊防敗毒散方見前主之瘡疹非熱不出疹子欲出則遍身發熱或煩躁或頭眩或身拘急及既出則身便涼諸病悉解此一層疹子隨收矣如疹子即出熱甚不減此毒壅遏宜大青湯方見前解其表便澀者以黃連解毒湯方見前合人參白虎湯方見前或大連翹湯解其里大便不通者河間涼膈散方見前加牛蒡子大連翹湯此解裡熱之良方痘疹通用連翹防風瞿麥荊芥穗車前子當歸柴胡蟬蛻赤芍藥白滑石木通黃芩甘草山梔子各五分上銼細加紫草五分水一盞半煎至一盞去渣食前溫服博愛心鑑有牛蒡子名大連翹飲凡疹子只要出得盡則毒邪解散正氣和平如拂拂發熱煩悶不寧如蛇在灰如蚓在塵之狀或嘔吐或注泄此毒邪壅遏尚未出盡煩熱者宜黃連解毒湯方見前嘔泄者柴胡橘皮湯並外用胡荽酒方見前以苧麻蘸酒遍身戛之待疹子出盡則煩熱自去嘔泄自止矣柴胡橘皮湯柴胡橘皮黃芩半夏人參白茯苓各等分上銼細加竹茹一團生薑一片水一盞煎七分去滓溫服無時疹子欲出未出之時宜早發散以解其毒則無餘災若不預解使之盡出以致毒蓄於中或為壯熱日久枯瘁或成驚癇或為泄利或咳血喘促或作疳𧈟而死此雖一時戾氣之染未有不由於人事之未盡者也疹子收後身有微熱者此虛熱也不須施治待氣血和暢自然退去若熱太甚或日久不減以柴胡麥門冬散甚則以黃連解毒湯方見前合人參白虎湯方見前與前方相間服之如發枯毛豎肉消骨立漸漸羸瘦者柴胡四物湯主之柴胡麥門冬散柴胡五分甘草二分麥門冬八分龍膽草三分人參半錢玄參半錢上銼細水煎服柴胡四物湯治疹後餘熱柴胡麥門冬淡竹葉當歸身川芎生地黃白芍藥地骨皮人參黃芩知母上銼細水一盞煎七分去滓溫服不拘時疹後熱不除忽作搐者不可與急驚風同論用導赤散加人參麥門冬送服安神丸小便清者可治短少者不可治宜服抱龍丸導赤散治心熱發搐生地黃木通甘草炙各等分上銼細加淡竹葉七片水一盞煎七分去渣溫服一方加人參麥門冬安神丸當歸身麥門冬白茯苓黃芩甘草各半兩硃砂一兩龍腦二分半上為末湯浸蒸餅和獖豬心血搗勻丸如黍米大每服十丸燈芯湯下抱龍丸又名琥珀抱龍丸治痘驚真琥珀天竺黃白檀香白茯苓人參各一兩半粉草去節三錢枳殼麩炒一兩枳實麩炒一兩辰砂水飛五兩金箔一百片篩山藥炒熟一兩膽星一兩上各取細末再篩和勻每藥一兩取新汲水一兩重入乳鉢內杵勻丸如彈子大陰乾勿用日曬曬則燥裂矣每服一丸薄荷葉煎湯化下凡疹後牙根黑爛肉腐血出臭息沖人者曰走馬疳馬鳴散主之若面頰浮腫環口青黑頰漏齒脫唇崩鼻壞者死證也如唇口多瘡其聲嗄啞者曰狐惑以化𧈟丸主之更煩躁昏悶失聲者死證也馬鳴散治走馬疳良方人中白即溺桶底白垢也以物刮取用新瓦盛之火煅過如白鹽乃佳半兩馬鳴退即蠶蛻紙也火燒過二分半五倍子生一分另用一分同礬煅枯白礬二分捶碎另取五倍子一分入礬干內以火煅枯共為細末用濃米泔浸洗淨拭乾以此藥敷之化𧈟丸蜀椒取開口者炒去汗二分黃連半兩苦楝根白皮陰乾二分共為末用烏梅肥者七個艾湯浸去核搗爛和丸艾湯下疹後泄利日久不已者曰休息痢不可妄施澀劑以成霸功宜黃芩湯方見前合天水散方見前與香橘丸相間治之若嘔吐不能食者名噤口更腸滑不止或下鮮血或如塵水者皆死證也香橘丸木香半兩黃連一兩以吳茱萸五錢同炒去吳茱萸不用石蓮子取肉二錢半陳皮半兩上為末醋調神麯糊為丸如麻子大每服二三十丸陳倉米湯送下疹子收後微咳者此肺氣未平也不須調治若咳轉甚喘氣逆氣發則連綿不已者此肺中伏火金虛葉焦故咳也宜人參清膈散主之身熱者麥冬清肺湯主之若咳久不止面浮目胞腫胸高而喘息則聳肩血自口鼻出面色青或赤鼻燥昏悶搖頭擺手者皆死證也人參清膈散治肺熱鼻乾涕唾稠黏人參柴胡當歸白芍藥知母白朮黃耆炙地骨皮紫菀茯苓甘草桑白皮桔梗各五分黃芩二分半滑石七分半石膏七分上銼細加薑如錢大三片水一盞煎七八分去渣食後溫服麥冬清肺湯治疹後咳嗽不止天門冬麥門冬各去心知母貝母杏仁去皮尖炒研地骨皮各等分共銼片水一盞煎七分去滓溫服疹家通禁雞魚炙煿鹽醋之類直過七七之後方可食之惟宜食淡不可縱口致生他疾也曾見痘疹收後動止出入飲食如常忽然心腹絞痛而死者還是元氣怯弱乘以疫癘之氣正不能勝邪邪伏於中外若無病內已虧損故一中而死謂之中惡凡小兒初生未滿月者遍身紅點俗呼奶疹者是也此由胎中受熱故生下發見於皮膚不可作時行疹子論妄用湯劑蓋臟腑嬌脆氣血怯弱不能勝湯丸也宜用溯源解毒湯與乳母服之溯源解毒湯解胎毒之良方當歸身川芎連翹人參白芍藥生地黃黃連甘草生陳皮木通各等分上銼細加淡竹葉十片水一盞煎半盞去渣溫服無時凡天行若病大便硬結熱留胃中故發斑不可以疹子同治妄用發表之劑反增危劇宜用人參白虎湯方見前去人參加大青玄參生地黃主之大便祕者以三黃丸微利之三黃丸解毒裡實者可用黃芩五錢黃連大黃各二錢半上為細末雪水搗丸緑豆大硃砂為衣每服五七丸食前燈芯湯下張景嶽曰萬氏治疹發表之法極盡隨時制宜之善然發表之義亦最不易如營衛不足而疹有不能出者其證甚多若徒知發之而不知滋之非惟不能發且恐窮其源矣如傷寒三表之法實亦有關於此又曰治疹諸條皆極詳妥其中惟瀉喘二證則最多疑似蓋二證之由疹毒固當如其治矣然有不因疹毒或以脾氣本弱而過用寒藥或以誤食生冷致傷脾胃而為泄瀉者雖曰由疹而發然實非疹毒之病但察其別無熱證熱脈而兼色白氣餒者便須速救脾氣若執謂疹毒則無不危矣又如氣喘一證大有虛實蓋十喘九虛若察其本非火證又非外邪或以大瀉或以大汗而致喘者必皆氣脫之候凡此二者不可不加細察也霖按痧疹一證宋元以來雜入痘門所謂氣血不分陰陽淆混萬氏獨闢蠶叢別開蹊徑指後學之津梁拯嬰兒於衽席厥功甚偉其論治之精已無異議惟相隔幾及四百年天運轉移風氣日薄因時制變未可拘牽當師其法勿泥其方斯深得其心者矣朱濟川曰夫疹亦胎毒也比痘稍輕然中有臟腑之分發因時氣之擊春溫夏熱秋涼冬寒此四時之正氣也冬宜寒而反溫則陽氣發泄太早至春必發疹也故經曰冬居溫暖春必痘疹又曰少陽客臟則丹疹外發證分虛實之異治有補瀉之殊然其證之發也類於傷寒寒熱頭疼目淚汪汪鼻流清涕嘔吐泄瀉喘嗽噴嚏譫妄溺澀飲食不進煩躁悶亂睡臥不寧此因陽火攻擊以致毒乘於脾熱流於心而干於肺蓋肺主皮毛脾主肌肉疹之出賴二臟以行其毒惟利於發得透徹則毒盡出皮膚內熱自清則無患矣所以疹之出必咳嚏衄血嘔吐泄瀉也若其初發自頭面先見而至足為齊頭面淡紅愈多為佳其形若芥子細密其色若桃花紅活隱見二三番三四日漸沒人事安寧飲食如常二便清調此其順也若亢熱喘急發不能出或一出即沒或冒風沒早或雖出而紫黑無神或淡白乾枯或身肢雖見而頭面不出及加喘脹胸高肩息狂言譫語或口鼻出血搦手搖頭尋衣摸床飲食不進噦惡便祕口出尸氣此皆不治若喘嗽煩悶睡臥不安二便堅閉飲食不進疹雖出而紫滯乃毒火熾盛治宜清解為主若疹雖透而色淡白乾咳不續減食便溏精神疲倦乃中氣不足宜固中氣而兼清肺為主一有正氣不足不能逐邪外出致毒伏於內喘脹而死俗名悶疹也間有風寒外襲閉其腠理或飲食停滯而氣道窒塞以致疹不易出治宜疏利為主論曰微汗而邪無蓄便清而毒無壅且如腸胃結而疏利弗緩腠理窒而發散毋遲衄血而邪從衄解利下而毒以利松咽喉腫痛降火為急煩渴不已解毒為先飲食減常須救胃語言譫妄必清心時令冷兮投辛熱時令涼兮用辛溫時令既溫辛涼無阻時方炎熱辛寒可施故曰必先歲氣毋伐天和治疹之要先宜解散為主解散則皮膚通暢腠理開豁則毒盡透解則無餘邪之為後災若不知解散或藥誤溫寒或坐視犯禁使邪不盡泄留蓄於中變證百出或煩躁悶亂瀉利失血目赤口疳不食便祕喉痛聲啞喘嗽痰涎疔癰瘡腫等證見矣古人曰治別虛實法宜變通所謂活潑潑地是神術也今人以疹為輕不能調護乃為風寒外束及為生冷內傷郁遏毒氣而不得外達欲出不出或一出即沒反毒內攻噬臍何及醫者亦以為易治孟浪用藥而不知禁往往誤人不為已咎也可痛可惜疹之出有中腑之正疹有風寒發疹有厲毒發疹有內傷發疹不可不辨然中腑之正疹者辛涼而發之風寒發疹者辛溫而汗之厲毒發疹者辛寒而清之內傷發疹者苦平而利之也凡疹之出雖先以發散為貴若表實不易透或風寒壅遏者發解可也若表虛自汗疹毒易出而妄投之豈免虛虛之禍乎臨疹當辨虛實不同一治凡出疹首尾慎不可用燥悍之藥者蓋疹從肺始肺屬金而西兌勝燥之方性勇悍而少柔喜清潤而畏燥烈故曰疹要清涼投清涼則升用燥烈則𤷉𤷉音吉氣急也倘不得已而用麻黃桑皮等性燥之藥必蜜炒再加性潤之藥佐之以折其悍氣則可矣若誤用之則金愈燥烈譬猶滔天之焰復添以油豈有不斃之理哉孫東宿曰痧疹咳嗽喘急每用痘門中大小無比散每服五七分大者一錢即刻喘定而睡醒後神安氣和而愈屢用屢驗乃引熱毒從小便出也大無比散治熱毒大甚驚狂譫語引飲豆瘡紅紫黑陷桂府滑石飛過六兩粉草一兩辰砂飛三錢雄黃飛一錢上末每三五歲服一錢十歲服二錢發熱之初用敗毒散調下亦能稀豆若報豆後用燈芯湯下小無比散治痘壯熱口渴小水澀大便祕口氣熱煩躁不寧或焦紫或紅斑自發熱至起壯時有熱者皆可用痘後餘熱亦可用桂府滑石飛過六兩石膏飛過一兩粉草寒水石各五錢鬱金蟬肚小者甘草湯煮干為末七錢上俱制淨末和勻每五歲者服二錢大人再加冬月燈芯湯下夏月井水調下熱甚不解者井水磨犀角汁調下若紅紫頂陷不起加穿山甲末一分麝香半分紫草煎湯加酒一二匙調下即起王肯堂曰萬氏云疹屬少陰心火心火旺則刑肺金治疹專以肺為主按既是心火刑肺金即是賊邪其證當重何反輕於痘余每治痧疹但據見證以瀉白散加減大劑投之即至危困之證無不愈者其他時師用苦寒降火辛溫發表而頻於危亡者不可勝數安在其為心火刑肺也瀉白消毒散桔梗甘草各一錢浮萍曬乾二錢牛蒡子炒研荊芥穗各一錢半桑白皮地骨皮二味自採鮮者各三錢上為粗末每服三五錢水一盞煎六分濾清服霖按疹因伏氣熱邪干肺者此方有散瀉肺熱保定肺氣之功若疹因外感風寒所閉誠有如吳鞠通所論戀定邪氣之禍臨證之士不可不慎也聶久吾曰痧疹形如沙痘疹形如豆皆象其形而名之也沙痘俱胎毒而痘出五臟臟屬陰陰主閉藏其毒深而難皆痧出六腑腑屬陽陽主發散其毒淺而易散臟陰多虛寒故痘可溫補腑陽多實熱故痧宜解散然痧雖屬腑而其熱毒之氣上蒸於肺肺主皮毛實受其毒是以發熱之初雖似傷寒而肺家見證獨多咳嗽噴嚏鼻流清涕眼胞腫眼淚汪汪面腫腮赤是也治之之法惟在宣發其毒以盡出之於外雖紅腫之甚狀如漆瘡亦不足慮以其既發於外即可免內攻不若痘家之必顧其收結也此證若調治得法十可十全而調治失宜則殺人亦如反掌痧疹初發熱欲出未出時宜用宣毒發表湯宣毒發表湯升麻八分葛根八分桔梗防風去蘆各五分荊芥薄荷甘草各三分牛蒡子炒香研細前胡枳殼炒木通連翹去心蒂研碎淡竹葉各六分天氣大熱加炒黃芩八分大寒加蜜炙麻黃八分霖按前論天氣大寒只宜置之燠室謹避風寒且天氣雖寒而人身之熱毒未必減云云此因天氣大寒即加麻黃何矛盾之甚耶愚意審因寒閉麻黃不可不加若體質素弱不能送毒外達非獨麻黃不可誤用即升散太過肺氣大泄而煩喘危殆者余見多矣宜於升散劑中重加玄參滋水解毒以啓發腎氣庶免虛虛之禍斯臨證之工最當詳察者也痧已出而紅腫大甚宜用化毒清表湯化毒清表湯連翹黃連地骨皮葛根牛蒡炒香研細黃芩知母天花粉山梔炒玄參各八分桔梗前胡木通各六分甘草薄荷防風各三分口渴加麥門冬去心一錢白石膏煅研三錢大便澀加酒炒大黃一錢二分有毒氣流注而成痢者宜用清熱導滯湯清熱導滯湯黃連條芩白芍枳殼炒山楂肉各一錢厚朴去皮薑汁炒青皮檳榔各六分牛蒡子當歸甘草連翹各五分紅多者加紅花三分地榆五分祕澀甚者加酒炒大黃一錢二分孟介石曰痧疹屬肺屬火系稟胎毒蘊積本經亦因感歲氣而出發熱五七日方得見形初時咳嗽涕淚目如含水之狀身體微汗潮潤則出最輕若氣喘鼻乾作嘔驚狂者最重初見如芥子如米尖再後成片紅色者輕紫色者險黑色者逆不可視為泛常死生雖由天命豈可用藥失序致令夭亡務宜辨寒虛實察毒氣淺深庶人事始盡也大抵初發熱時必當微表見形即宜清涼一種初起眼白赤紅聲啞唇腫作渴腰痛腹脹人事不清口鼻出血煩亂狂叫不安閉塞不出即大凶候也服大劑清涼解毒藥後若能現出者或可得生鼻內流血者重口內流血者毒尤重又一種初時失於清解過於發熱以致後來元氣虛弱毒氣停內口鼻出血腥臭骨瘦不堪或生牙疳身熱不退終成壞證不可不慎此證日出三次三日九次為順總宜出透毒氣得淨即無他患一種奶痧風疹此類感風熱而出乃皮膚小疾服疏風清熱之藥即愈不在此痧疹中論也痧疹與痘瘡不同未見形並初見形時微表或可如太過則胃氣受傷反令停毒攻肺生痰作喘以致閉塞難現若服發表藥而不出者此熱結在內速宜清涼行利則肺竅清而毛孔易開痧疹乃現今之愚夫愚婦表痧痘多用櫻桃荔枝核蔥頭等物不知此數種性熱大不相宜輕者服之轉重重者變逆惟發表時只宜羌活荊芥少加一二味兼佐以連翹牛蒡子觀音柳紫草石膏此種實為專司發痧之藥其性雖涼而能通肺達表故不可少一種痧疹初起四肢逆冷乃火極似水之故不可妄投熱藥宜當利下清涼痧現自然漸和也痧疹吐蟲解蟲皆系熱盛大約吐者重而解者輕用藥以清熱為主如黃芩梔子丹皮若吐蟲解蟲在出痧之後者可加烏梅一二痧前則忌痧疹前後瀉利不宜用藥速止如瀉黃紅色乃內有伏熱加黃連黃芩車前子可也痧疹後眼目赤紅者當用生地菊花決明子蒺藜歸尾柴胡紅花等味一種痧後面色青白骨瘦不堪元氣損傷肝脾血少成痞眼懶睜畏明似害非害宜服健脾肥兒丸或服六味地黃丸庶可漸愈一切疏風治眼之藥萬不可妄投不但痧後當如此凡小兒病後失調成疳疾痞眼者俱當如此醫治養血健脾為主倘大便泄瀉稀白水者歸脾湯補中益氣湯對證要藥也若瀉黃水者則又在熱論即不宜服此痧疹發熱二三日或四五日末見形疑似之間用防風發表湯防風發表湯防風五分乾葛八分紅花三分枳殼七分炒甘草五分桔梗八分蘇梗六分川芎五分荊芥六分當歸六分陳皮六分杏仁一錢炒山楂肉二錢白水煎朱純嘏曰可去陳皮加牛蒡子七分連翹殼五分痧疹見形一二日內服解毒快斑湯解毒快斑湯托表涼解活血化毒連翹七分荊芥六分防風六分牛蒡子六分生地二錢蟬蛻三枚歸尾六分山楂肉二錢桔梗八分川芎五分乾葛八分黃芩八分酒炒紫草八分白水煎或加觀音柳五分朱純嘏曰此方可用再加生犀角磨汁和藥同服更好痧疹見形二三日內色紅煩躁出不透快宜服竹葉石膏湯竹葉石膏湯竹葉三片紅花三分生地二錢煅石膏三錢花粉八分陳皮五分甘草五分黃連五分微炒殭蠶五條連翹六分玄參一錢牛蒡子六分桑皮一錢如大便不解加生大黃二錢再不解即加玄明粉二錢惟熱毒重盛者方可如瀉紅水或作煩渴亦加大黃痧疹四五六日回時尚有餘毒留於肺胃咳嗽氣粗外熱不退者服清肺飲清肺飲竹葉二片生地二錢柴胡六分麥冬一錢玄參一錢桔梗八分殭蠶五條甘草五分陳皮六分黃芩八分歸尾八分知母八分石膏二錢白水煎朱純嘏曰此方可用引加燈芯五尺同煎服痧後面色青白唇淡氣弱宜服調元健脾保肺湯調元健脾保肺湯並治痧後瘦弱成疳疾黃耆白茯丹皮陳皮沙參白芍酒炒人參當歸百合甘草如大便不實瀉白色者加木香白朮如瀉黃色加酒炒黃芩車前子黃連朱純嘏曰此方宜加薏米麥冬建蓮肉同煎服痧後痢疾下紅白乃肺經餘毒流注大腸或飲食失調宜服健脾解毒湯健脾解毒湯炒黃連七分澤瀉八分山藥八分甘草五分炒扁豆一錢五分白芍酒炒六分茯苓八分木香一分山楂肉一錢丹皮七分白朮七分炒陳皮五分如無黃連加蜜水炒黃柏亦可身體虛弱面青唇白加沙參三分晚米二錢痧後口瘡牙疳等患宜服清胃敗毒湯清胃敗毒湯殭蠶丹皮甘草生地連翹桑皮沙參茯苓黃柏蜜炒銀花如體虛加白朮朱純嘏曰此方不敢遽以為是痧後口瘡牙疳宜搽救苦散救苦散人中白五錢煅飛青黛二分冰片一分殭蠶一錢寒水石井水飛細三錢共為細末先以苦茶拭口隨搽此藥富貴之家加牛黃二分研入其效更速朱純嘏曰此方輕證亦頗有驗重證恐未必能奏全功也痧疹咽喉腫痛不拘初起回後用二聖散二聖散苦參三錢白殭蠶二錢共為細末吹入有一種痧痘大吐大瀉而後見者甚輕與作惡心乾嘔者不同用藥微表和平安胃為主宜服和中湯和中湯歸身七分陳皮五分甘草五分白朮八分炒柴胡六分防風六分白茯七分白芍酒炒六分乾葛八分丹皮五分桔梗七分白水煎有種病後瘦弱唇白氣虛感時氣出痧疹者宜服加味逍遙散加味逍遙散體弱氣虛痧出白色少紅活者俱可服薄荷白茯歸身炒白朮丹皮陳皮柴胡炒白芍麥冬甘草乾葛白水煎痧疹不拘前後痰多咳嗽有風有熱者俱宜服抱龍丸抱龍丸鉤藤一兩桔梗二兩天麻二兩陳膽星四兩陳皮一兩薄荷一兩殭蠶五錢川貝母一兩去心升麻五錢共為極細末煉蜜成丸如彈子大硃砂為衣乳孩每服半丸大者每服一丸白滾水下若外感風邪用防風五分煎湯調下若內熱用竹葉湯調下痧疹咳嗽氣喘唇紅結熱在內煩躁不安口鼻出血不拘前後俱宜服犀角解毒化痰清火丸犀角解毒化痰清火丸歸尾八錢連翹一兩赤芍六錢生犀角一兩生地二兩丹皮一兩紫草一兩牛蒡子三錢花粉一兩黃連三錢薄荷川貝母一兩去心甘草梢一兩共為細末煉蜜成丸如彈子大每服一丸竹葉湯化下犀杯不入藥痧後失調體瘦氣弱或成疳疾或泄瀉等證宜服健脾肥兒丸健脾肥兒丸人參三錢黃耆一兩蜜炙炒神麯二兩扁豆一兩炒白朮一兩甘草六錢生黃連三錢山楂肉二兩陳皮五錢白芍六錢炒當歸身八錢橘紅五錢白茯苓一兩山藥一兩地骨皮六錢百合八錢共為細末煉蜜成丸如彈子大每食遠白滾水下一丸不用人參亦可朱純嘏曰凡蜜丸俱忌食蔥痧後咳嗽內熱不清心神慌亂夜臥不安脾虛或生瘡疥宜服天真膏天真膏生苡仁麥冬去心玄參沙參生地生黃耆桑皮各四兩丹皮茯神當歸白茯苓炒棗仁紫菀橘紅各二兩取長流水用砂鍋桑柴文武火熬成珠上好白蜜收成盛瓷器內每服三五茶匙白滾水調服霖按聶氏三方已得要領孟氏治法較備然亦不能出其範圍但兩家皆為近世所宗並録之以作後學楷式張隱菴曰痘乃先天之毒疹屬後天之邪先天止有水火後天始備五行産下發聲吮乳肇自後天是以發聲之時口中有毒即咽下而歸於陽明故瘄之毒氣發於陽明上達於肺出於皮毛肺主氣而外合皮毛是以痘毒走於血分而氣以化之為順瘄毒走於氣分而血以和之為順若走於血分而見雲頭紫赤斑者逆也瘄乃氣分之毒更速於痘若停留於胃則爛牙齦阻滯在肺則為鼻煽喘急發表疏里清熱解毒事在良醫之臨證妙用者也夫氣為陽血為陰痘乃精血中毒故應四時之生長收藏以合地支之數瘄乃氣分之毒是以一日三烹三而三之以應陽九之終痘發於陰故宜頭面稀疏不喜獨參陽位瘄發於陽故喜大烹頭面不宜惟在心胸此人之陰陽血氣應天地自然之道也治瘄主方葛根桔梗荊芥牛蒡子防風杏仁甘草橘皮上方用泉水煎服再隨四時之氣而加減用之如寒閉者宜麻黃熱閉者宜石膏食閉者宜枳朴山楂熱甚者加黃芩黃連毒甚者加白花地丁西河柳渴者加知母喘者倍杏仁裡實者加葶藶牽牛蓋痘疹有血氣之分而用藥亦宜分別如大黃大戟血分之瀉藥也葶藶牽牛氣分之瀉藥也黃連形壘如連珠瀉心火之藥也黃芩外肌皮而內腐空故名空腸又名腐腸乃瀉肺而清肌表之藥也肺主氣而心主血故清痘之熱毒宜以連為君而芩為佐清瘄之熱毒宜以芩為君而連佐之又如金銀花花開黃白藤名忍冬能啓陰氣而解氣分血分之熱毒蓋黃走血而白走氣也故解痘毒者宜之而瘄毒亦可若夫白花地丁又專於瘄證者也此用藥之大關目學者引伸觸類微妙無窮霖按張氏論治處方皆極精妙用藥辨別氣血尤具卓識惟述原蹤前人之誤云痧疹為後天胎血咽入之毒亦智者之一失也余長子坤生即悶絶經時始蘇穩婆將口中穢血拭去咸謂必無痧痘之險比長痘出雖稀痧疹頗重年二十死於瘵始信古人之言未可深泥章虛谷論痘疹之源謂痘為先天之毒成於父母媾精之初疹屬後天兒在胎時呼吸之息不由口鼻惟一縷臍帶通於子宮與母呼吸相貫父母不能節欲欲火即由臍帶中隨兒闔闢之息而入吸由於腎腎主閉藏故毒蘊於腎臟也此説似覺近理但痘疹同是命門伏毒感於陰則發痘感於陽則發疹陰主血以氣為固陽主氣藉血為資此中陰陽互根之至理在焉然雖云伏毒亦必待六氣之火相激而動其痘疹多發於子午卯酉之年者為少陰君火司天在泉故也蓋人身命門伏藏之火與司天在泉之火相搏激而後發試觀極北之蒙古不發痘疹曷何故歟乃寒水凝結之鄉君火之令不行耳肘後論言痘疹名虜瘡為馬伏波徵南所染傳入中國南位離火得氣最先固是天運之轉移而六氣之火相引人身之火昭然可證又何必紛紛臆度哉高士宗曰瘄猶錯也皮膚甲錯之謂也俗名曰瘄實系疹也紅點隱隱謂之隱疹疹之根源乃毫毛之內皮腠之間因於寒致血凝澀其凝澀之血散發於皮膚之外則發而為疹蓋人身通體毫毛之氣肺所主也毫毛之內腠理之外則秉胞中之血熱肉充膚淡滲皮毛肝所主也皮膚寒而血凝澀始焉凝澀繼欲流通則發熱咳嗽散而發疹疹之發也有稀少有稠密極稀少者不過數點以及數十點極稠密者則周身頭面無有空隙醫者不知其故見有數點即行攻發若皮膚肌腠之間果有凝澀則發熱咳嗽自當湧出其不能即出者非肌肉不和即氣虛不振治之之法當以紅花歸芎荊柴羌丹之劑和其肌表或以桂枝耆朮歸芍苓甘之劑助其氣虛若概以蘇麻前杏芩連石膏之劑投之其氣虛不出者此為虛其原本本自稀少者此為無故受賊非惟疹不能出其經脈表裡受虧致身大熱而喘急生愈熱愈表愈喘愈發輕者重重者死矣蓋痘之發也見有一二點其勢必出疹之發也見有一二點可出可不出若肌表果有凝澀之疹則身熱咳嗽其勢自出若無疹則止此數點不能再增善治者明乎此理不行攻發但調其經絡和其榮衛虛者補之寒者溫之則熱退身安而愈無奈矇昧不明當疹毒盛行之時見有數點即行攻發轉攻轉劇愈發愈危必致真臟虛敗而死真可痛耳夫痘毒起於腎不從經脈而出為腎經痘雖有良醫不能挽回若疹則其根源在於肌腠皮膚膚腠之血根於胞中血海膚腠寒而胞血稽遲則有疹毒之證得其源而活法以治或聽其自然而不加妄治百無一死也霖按痧疹陽毒治宜清解間有賦質孱弱或為苦寒過劑不得不用溫托作補偏救弊計然亦千百中僅見一二知此法以處變則可泥此法以殺人則不可致謂根源是血因寒凝澀滯於膚腠之間散而為疹設此論為概用溫補地步貽誤後學尤屬大謬士宗與張隱菴同負盛名觀此其兩人優劣可見
