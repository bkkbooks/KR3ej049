body:
  text: 卷四運氣汪雙池曰五運六氣內經言之甚詳而先儒或不之信然以氣類推之則亦或有然者醫者不可以不考也其不盡應則所處有東西南北之殊如南方多暑北方多寒東方多風西方多陰土地有燥濕高下之異處高則多風寒處下則多濕熱下濕則春夏之氣常存高燥則秋冬之氣常存又有餘不足勝復郁發之際每乍變其常而非可一端盡如陽則有餘而氣先至甲丙戊庚壬之歲也陰則不足而氣後至乙丁己辛癸之歲也氣有餘則乘所勝而侮所不勝如木盛則乘土而侮金火盛則乘金而侮水土盛則乘水而侮木金盛則乘木而侮火水盛則乘火而侮土也氣不足則所勝侮之所不勝乘之如木不足則土侮之而金乘之火不足則金侮之而水乘之土不足則水侮之而木乘之金不足則木侮之而火乘之水不足則火侮之而土乘之也氣乘所勝為勝子復母仇為復如以風勝濕風勝清復以暑勝清暑勝寒復以濕勝寒濕勝風復以清勝風清勝暑復以寒勝暑寒勝雨復也不足之歲則有勝復有餘之歲則無之鬱而發者兩間之氣有升有降而或為司天在泉之氣所遏則鬱而後發也又主客相乘有相生相剋比和之不同相生則氣和相剋則氣暴客克主為順主克客為逆又運氣迭推有此盛彼衰彼盛此衰平歲之異故化氣與司天之氣同則為天符干支所屬之氣同則為歲會化氣與在泉之氣同為同天符地支所屬與在泉之氣同為同歲會惟化氣及地支所屬及司天之氣皆同如戊午乙酉己丑己未之歲則曰太乙天符其氣最烈故運氣之變又不可以一例盡也大抵如周禮內則所云春多酸春氣行而肝木旺恐木氣過而侮金故酸以瀉肝而補肺夏多苦夏氣行而心火旺恐火氣過而侮水故苦以瀉心而補腎秋多辛秋氣行而肺金旺恐金氣過而剋木故辛以瀉肺而補肝冬多咸冬令行而腎水旺恐水氣過而剋火故咸以瀉腎而補心調以甘滑甘土味土兼成五行甘兼補五臟故四時皆用之淡滑者滋味之本得氣於大故四時皆調以甘滑也甘味多緩亦能生濕痰滑又以滲濕故肝無患過緩矣是亦即內經所謂升降浮沉則順之寒熱溫涼則逆之毋伐天和之旨也及夫多風多暑多雨多熱多涼多寒之歲則因時調燮毋助其愆如多暑之歲則勿用熱藥多寒之歲則勿用寒藥多雨之歲則藥宜燥濕多風之歲則藥宜祛風俗有云春不麻黃夏不蘇亦是此意但不可泥耳因變制宜常非可泥如寒水司天之年或未必寒而反酷暑君火司天之年或未必熱而反多寒濕土之年或未必雨而反多晴此多由勝復之變氣運相違又高土少濕多寒下濕少寒多濕則又各因其地也蓋時行之證必謹察乎歲氣所偏如病自人生則氣運或所不同時行之證即六淫也如春而痟首夏而瘡疥飧泄秋而病瘧冬而咳逆及歲或大溫大疫大寒之類是多歲氣所偏之變若病自人生則如七情之傷及飢飽勞役所致是無關於氣運其當熱當寒當補當瀉無問歲氣時候故隆冬而用寒藥盛夏而用熱劑者亦有之歲氣豈可盡拘乎但人之臟氣有偏者則亦每因歲氣所偏而併發是又所宜兼考也如懵不知有五運六氣之說則又何以能因時制治而不至於伐天和也內經所載反復詳悉學者或未能盡識此撮其大略於篇俾學者知所考焉十干化氣甲己化土所謂黅天之氣甲年為太過己年為不及甲己之年首丙寅月丙火生土故甲己化土化氣者其所生之氣也乙庚化金所謂素天之氣乙年為不及庚年為太過乙庚之年首戊寅月戊土生金故乙庚化金丙辛化水所謂元天之氣丙年為太過辛年為不及丙辛之年首庚寅月庚金生水故丙辛化水丁壬化木所謂蒼天之氣丁年為不及壬年為太過丁壬之年首壬寅月壬水生木故丁壬化木戊癸化火所謂丹天之氣戊年為太過癸年為不及戊癸之年首甲寅月甲木生火故戊癸化火化氣自寅月地氣始升於上也寅月而三陽出於地上是地氣始升也故化氣自寅月數或謂逢龍則化者非是歲運由是推焉每歲三百六十五日零三時分為五氣則每氣行七十二日三時有奇如立春後為初運至清明後十二日余而交二運至夏至後八九日間而交三運至處暑後二十日余而交四運至立冬後二三日間而交五運故五運自寅月始主運歲歲皆然以木為初運火為二運土為三運金為四運水為五運客運如甲年則初運太宮土二宮少商金三運太羽水四運少角木終運太徵火乙年初運少商金二運太羽水三運少角木四運太徵火終運少宮土丙年初運太羽水二運少角木三運太徵火四運少宮土終運太商金丁年初運少角木二運太徵火三運少宮土四運太商金終運少羽水戊年初運太徵火二運少宮土三運太商金四運少羽水終運太角木己年初運少宮土二運太商金三運少羽水四運太角木終運少徵火庚年初運太商金二運少羽水三運太角木四運少徵火終運太宮土辛年初運少羽水二運太角木三運少微火四運太宮土終運少商金壬年初運太角木二運少徵火三運太宮土四運少商金終運太羽水癸年初運少徵火二運太宮土三運少商金四運太羽水終運少角木六氣參錯其間或則相助或則相制而變化紛矣十二支合化子午少陰君火火胎於子而旺於午天地之經位嚮明而治故為君火火而謂之少陰者至午位而陰己萌陰以始生為少也君火本也少陰標也應在腎心腎應在子心應於午腎為足少陰經心為手少陰經子對化午正化也子非火位而對化為火正化火有餘對化火不足丑未太陰濕土二支自是土位然土旺四季辰戌丑未皆土而獨主丑未者土為太陰丑未陰支若辰戌則陽支也土生於火則依母在未水為土配則依妻在醜土為太陰者陰以極盛為太也濕土本也太陰標也應於肺脾肺應在醜醜為金庫脾應在未土之正位肺為手太陰經脾為足太陰經醜對化未正化也肺非土而對化為土其濕同正化土有餘對化土不足寅申少陽相火火生於寅而病於申木旺於寅而胎於申相火者方生之火而行於木為龍為雷故寅申為相火君居正位相助其旁也方生之火火不相附故為少陽相火本也少陽標也應於膽三焦膽應在寅寅木火之位膽木實行相火之氣猶震木雷火也三焦應在申申為水長生之地三焦行相火而實水道之官也膽為足少陽經三焦為手少陽經寅正化申對化也申非火而對化為火正化火有餘對化火不足卯酉陽明燥金金胎於卯而旺於酉地經南方火位而革陽從陰是為燥金金而謂之陽明者陽盡顯於外而嚴肅剛明也燥金本也陽明標也應在胃大腸胃應在卯卯與未合胃與脾合以木從土實行肝氣而其腑主藏納故又從金大腸應在酉酉金之正位而酉與醜合大腸與肺合金實生於土也胃為足陽明經大腸為手陽明經也卯對化酉正化也卯非金而對化為金正化金有餘對化金不足辰戌太陽寒水水庫在辰火庫在戌而戌當乾位乾為寒為冰故辰戌為寒水水而謂之太陽者水居五行之始陽氣之元也陽以始為太故曰太陽寒水本也太陽標也應在膀胱小腸膀胱應在辰膀胱津液之腑辰與申子和膀胱與腎合小腸應在戌小腸沁別水穀滲入膀胱戌與寅午合小腸與心合而從水化膀胱足太陽經小腸手太陽經也辰正化戌對化也戌非水而對化為水正化水有餘對化水不足巳亥厥陰風木木病於巳而生於亥巳當巽位巽為風為木故巳亥為風木而謂之厥陰者陰至下極物極則反必逆而復上故冬至陽生為生木之始陰以逆為厥也風木本也厥陰標也應在心包肝心包應在巳肝應在亥心包為手厥陰經肝為足厥陰經已對化亥正化也巳非木而對化為木正化木有餘對化木不足六氣行自醜半地闢而天氣通也天開於子地闢於醜地闢而天地通故六氣自大寒始十干屬天而五運行氣於地地在天中而亦常承天者也十二支屬地而六氣加臨自天天包地外以運行氣交地中也昔人分配多失其義茲特為詳正之歲氣以是行焉主氣歲歲所同客氣每年各異主氣錯於四時而陽贏陰乏主氣歲自大寒厥陰風木始行至春分而止自春分後少陰君火氣行至小滿而止自小滿後少陽相火氣行至大暑而止自大暑後太陰濕土氣行至秋分而止自秋分後陽明燥金始行至小雪而止自小雪後太陽寒水始行至大寒而止此每歲主氣之常客氣加臨則因歲支而變但主氣則濕土行相火之後客氣則濕土居二火之間大寒尚在冬日而風木之氣已行至濕土猶挾暑令故曰陽常贏秋分後而燥金之氣始行及大寒而寒水之令遂改故曰陰常乏木火陽也金水陰也客氣因歲推移加臨主氣之上而順逆和乖焉則因為民病客氣克主氣為順主氣克客氣為逆主客同氣而或相生為和相剋為乖然氣運不及則以相生相助為得其平氣運太過而復生之助之則愈厲矣此在民病所以有寒風暑火燥濕之淫也是故升降浮沉則順之寒熱溫涼則逆之所以調燮天和也六氣有司天在泉之氣有左間右間之氣迭為升降浮沉氣有鬱而不得升者則為升之有阻而不能降者則為降之如木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之之類是也其以寒治熱以熱治寒溫則涼之涼則溫之則所謂逆之也是故歲在子午少陰君火司天陽明燥金在泉司天之氣統主一歲又三氣以前司天之氣主之四氣以後在泉之氣主之又人身自天樞以上天氣主之自天樞以下地氣主之天樞之際中氣主之天樞謂當臍也中氣即主氣也初之氣太陽寒水在泉左間之氣客氣生主氣多風二之氣厥陰風木司天左間之氣客氣生主氣多溫三之氣少陰君火司天之氣二火合炎多暑四之氣太陰濕土司天右間之氣主客皆土多濕熱雨五之氣少陽相火在泉右間之氣客克主火傷金肺病終之氣陽明燥金在泉之氣客氣生主氣多清寒甲子甲午火生土多熱濕丙子丙午丙子歲會水勝火氣平丙午干支皆火多熱濕戊子戊午天符歲熱戊午太乙天符熱甚多疫腎肺皆病庚子庚午金氣盛歲平多燥壬子壬午風火相助多風溫多熱疫五運參錯考之以察民病焉雖不必盡泥要不可不知也歲在丑未太陰濕土司夭太陽寒水在泉說已見上初之氣厥陰風木主客同氣多風二之氣少陰君火主客皆火早熱生濕三之氣太陰濕土主氣生客氣濕熱大行四之氣少陽相火客氣生主氣熱濕大行五之氣陽明燥金主客同氣熱濕始平終之氣太陽寒水主客同氣民多寒疾乙丑乙未土生金金氣平丁丑丁未木氣不足土侮木鬱己丑己未太乙天符濕氣大行多雨多腫脹辛丑辛未土壅水水不足多寒濕擁癸丑癸未火生土火不足多寒濕五運參錯考之以察民病焉歲在寅申少陽相火司天厥陰風木在泉是歲風火相助肝膽為病初之氣少陰君火主氣生客氣風溫早作二之氣太陰濕土主氣生客氣濕熱大作三之氣少陽相火二火合炎火氣大行民多內熱四之氣陽明燥金火氣始平五之氣太陽寒水主氣生客氣清早寒終之氣厥陰風木主氣生客氣早寒多寒風甲寅甲申木火土交助濕熱較盛丙寅丙申歲平丙寅木火得氣丙申火令反減戊寅戊申天符相火盛炎肺腎交病庚寅庚申歲平庚申木火反衰壬寅壬申風木相火相益助歲風熱大作五運參錯考之以察民病焉歲在卯酉陽明燥金司天少陰君火在泉外寒內熱初之氣太陰濕土主氣克客氣為逆風濕並作二之氣少陽相火二火合炎金反不勝三之氣陽明燥金主氣逆在天之氣金反不勝多郁暑瘧痢四之氣太陽寒水主氣克客氣為逆寒雨並作五之氣厥陰風木主氣克客氣為逆風氣清冷終之氣少陰君火主氣克客氣為逆蛇蟲不蟄乙卯乙酉天符乙卯得