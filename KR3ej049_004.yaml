主寒涼國朝康熙二十三年第七十四甲子火燥運中故費書猶行於康雍之間乾隆九年交七十五甲子濕寒之運維時毗陵莊在田遂生編福幼編等書出有切戒寒涼之論盛行於時嘉道以後莊公之法投而不驗每遇痘痙等證多主清熱解毒瀉火墜痰殊不知嘉慶九年第七十六甲子火風用事同治三年第七十七甲子燥火用權是濕寒治法不可施諸風燥二火運中耳愚意痘疹時疫每與運氣相應但風火運中若遇虛寒之體又未便拘牽此說況地形有南北高下之不同人身有稟賦強弱之各異治病之法全在通達之士隨機應變是運氣之理不可不明而又未可泥執也選案萬密齊治案云甘大文從余學醫長男發熱余見之曰疹也三日之內不出身涼內熱毒火內伏故煩而坐臥不安也不急治且危文泣求醫余乃用葛根湯加麻黃石膏以發之一服疹盡出色白不紅余曰此血虛也用四物湯加防風一服色變紅隨愈又云吳道松四肢病疹或治之三日疹不出煩躁甚欲用荊防敗毒散曰此皆發熱之藥無解毒之用況天大熱又無時令之藥一二味在內則陽愈勝陰愈虧陽明不和此疹之所以不出也以東垣涼膈散加玄參升麻一服疹出三日起又云鄖陽楊舉人子疹後利下鮮血余授一方用當歸梢生地黃白芍藥炒條芩炒黃連人參生甘草枳殼烏梅肉調理而安時郡中出疹但病利血者楊公授此方皆效又云同郡周小川族人一小女疹後咳嗽失聲余授一方以甘桔湯加炒牛蒡子炒枯芩天花粉作散薄荷葉湯調再煎一沸服之而愈孫東宿治案云萬曆甲戌其年自仲秋徂冬瘄子盛行三月內余所治男婦嬰孩共七十二人苕之望族沈姓最著大中丞觀頤公當考功時幼君瘄喘嗽不寧聲啞發熱泄瀉斑紫不斂余以小無比散愈之又云程曉山中風歸而逆余診時其子僅七歲中疹一月餘矣發熱如故咳嗽聲啞肌削骨立頭髮盡禿衆醫束手舉家亦墮淚而已余以診曉山見之曰舉家驚惶謂此兒不保耶此疳證疳因疹後虛熱而發以大蘆薈丸治之可獲萬全君家初不問余者謂余非幼科專門也不知此特大方家餘事而為製藥服之藥未盡而病瘳江應宿治案云一兒三歲患疹出遲而早沒熱而咳嗽昏悶不食余診視曰疹出不透因風寒沒早宜急發之以蔥煮麻黃八分四物換生地加杏仁天花粉蔥姜煎服重復出一身比前更多三日沒盡而愈凡疹證出自六腑宜養陰抑陽剛劑決不可服犯之即發喘渴悶亂失於收救多致夭折如參耆半夏白朮當歸溫燥之藥亦所當忌只宜清熱養血如出遲者少加升散之藥送之達表而已又云表侄女九歲出疹沒早發咳嗽大發熱肌瘦不飲食唾嘔痰沫甚多延半月餘余往視之曰血虛病也以四物湯加杏仁阿膠麥冬五味炮姜一服熱退身涼痰咳俱止再劑而愈方蔭山治案云程氏子二歲出疹因出遲沒早發喘大熱舌短不乳昏沉醫皆不治余以玄參茯苓甘草麥冬升麻陳皮乾葛麻黃兜鈴黃芩知母犀角石膏名曰犀角石膏湯一服證減半二服愈太函集云吳橋以醫名里中有兄子始孩屢日發熱蒸蒸驚搐昏憒衆醫不知所出橋診之曰疹也寒邪外乘閉而不出是呱呱耳飲藥也已數中氣乃傷藥不足恃也當置沸湯一瓶撤其蓋令保母抱子坐湯側稍遠攤被圍之湯氣自遠熏蒸少飲藥內托疹出而解無何叢睦汪氏子病如之仍用向法並效其穩類如此故鄉人稱良焉繆希雍治案云賀知忍少子病痧疹家人不知尚以肉飯與之余適至驚曰此痧疹之極重者何易視之以西河柳兩許雜以玄參三錢知母五錢貝母三錢麥門冬兩許石膏兩半竹葉七十片二劑而痧盡現遍體皆赤連進四劑薄暮矣知忍曰兒今無恙乎余曰痧雖出盡煩躁不止尚不可保再以石膏三兩知母一兩麥門冬三兩加黃芩黃連黃柏各五錢西河柳一兩竹葉二百片濃煎飲之煩躁遂定而瘥霖按繆氏西河柳用如許之多獨不慮其溫升太過乎每用輒以石膏監製殆即仲景麻黃石膏同用之意也雖然遇稟賦怯弱之兒險矣朱濟川治案云一兒元月發疹身肢隱見不振而頭面不出面色青白喘脹悶亂右寸脈微余謂正氣虛不能逐邪上升於頭面宜補益而助升發為主以麻黃桂枝湯加人參二錢水煎服又以芫荽防風煎湯浴洗頭面手足疹透證平而愈又云一兒疹正出而恣食停滯腹飽便祕壯熱譫語余謂食壅而毒不化以大黃枳實栝蔞仁厚朴甘草黃連利之而尚喘嗽壯熱脈遲肢冷以附子理中湯又歸芍六君子湯治之愈又云一兒身熱咳嗽疹出隱隱醫以疹藥發之不見不沒余謂隱疹也由客受風寒鬱而不散非若中腑之正疹也以芎蘇散治之愈又云一兒疹出彌盛形如錦紋而間有頭粒色赤壯熱煩躁舌苔便祕余謂斑疹並行以調胃承氣湯利之又白虎湯合葛根湯治之愈又云一兒身熱疹出吐瀉余謂初出疹而吐瀉者乃陽火得泄吉兆也以升麻葛根湯表之疹盡透而愈亦有兼傷食吐利者前方加消化之藥又云一女出疹藥用寒涼又食生梨一二疹即殞沒喘急胸滿面青肢冷眼合聲啞昏暈余謂毒為寒鬱反毒內攻而然也以麻黃湯加葛根紫蘇甘草桔梗生薑服之外以被覆得汗而蘇疹復出喘甚於前余謂驟用麻黃燥烈之藥致毒火盛而肺氣熱也宜清潤之以甘草桔梗牛蒡前胡杏仁玄參知母天花粉黃芩麥門冬治喘息而愈又云一娠婦疹出熱甚墮胎而難産余以魚膠三寸燒灰存性麝香一分共研末好酒調下即産若難之甚及橫生用魚膠一尺制如前法雖立産其子不能生矣又云一孕婦疹出熱甚小腹痛而漏血余謂熱盛觸動其胎以升麻葛根湯加荊芥紫蘇條芩當歸川芎阿膠白朮陳皮砂仁治之血止愈亦有不同前治胎墮而子母俱亡或子亡母存又云一兒疹雖盡出而喘脹便祕壯熱譫語余謂毒壅不盡出以黃連枳實栝蔞仁桑白皮地骨皮知母石膏人中黃治之愈又云一兒疹後咽喉腫痛余謂餘毒不解以甘桔湯加牛蒡射干玄參連翹知母治之又葛槿散吹之而愈又云一子新婚出疹後痰嗽不已衆謂餘毒不盡用清解藥而痰愈熾余謂陰虧而火炎無制故午後潮熱而咳甚也治宜壯水為主以六味地黃丸料加麥冬知母治之愈又云一兒疹後乾咳嗽不續余謂醫過發散致肺氣虛耗以小異功散加麥門冬五味子貝母桔梗治之愈又云一兒疹後走馬牙疳齦潰穿鼻諸醫不效余以黃牯牛糞後尖瓦上煅存性為末人中白煅為末黃柏為末等分和勻吹之潰竅漸長齦齒俱生而愈又云一兒疹後乾咳不已余謂疹時過於解散肺氣虛耗宜補脾肺為主不信只以清火止嗽藥其背漸駝腿足細小終身痼疾亦有嗽久而胸高腫滿狀如龜胸啓云先生曰疹後久嗽則金衰金衰不能生腎水腎主骨髓腎無生氣則骨枯而髓減風寒乘虛而入於髓其邪凝滯故腰脊不舉而為斯疾也治法先以防風散驅其邪又八味地黃丸加人參杜仲牛膝當歸石斛何首烏米仁菟絲子萆薢鹿茸蜜丸又以驅風壯筋活血膏貼其凸處又灸肺俞穴膈俞穴一兒患此余診右脈緩弱謂脾肺不足先以人參白朮茯苓陳皮甘草貝母當歸芍藥米仁石斛水煎服脾土稍固又以前方法治之腿足漸而生肉背駝稍愈但不能脫然如故沈明生治案云沈翰臣婦咳嗽發熱或認為不足遽用六味地黃湯以滋陰分既而咳逆更劇診之脈浮且數風熱干乎肺家宜用疏表之劑服下遍身發出紅疹二劑咳差緩而仍未透更用辛涼等味以清表熱仍嗽復作瀉不已咸歸咎寒涼余笑曰非也肺受風邪邪變為熱經云邪並於陽則陽熱而陰虛始則疹在欲出未出之際火上炎於手太陰而作嗽今則疹在欲收未收之時熱下移於手陽明而作瀉是屬斑疹家常候何足怪乎行且止矣果越兩日而嗽寧瀉止身涼疹退按斑疹之候雖異斑疹之治略同是歲丁未濕土司天而春夏之交燥旱殊甚蓋猶襲乎昨歲燥金在泉之餘氣耳是以初當涼解而不利乎溫散次當寒潤而不利於溫補六味地黃丸之屬雖若相宜然質獨味厚不惟不能達表抑且錮蔽外邪施諸疹退而餘熱未清之時稍為近理今初熱始嗽輒為用之是非滋陰乃滋害也況以丸為湯已非古人本意而專投泛用尤乖病變之機自來善用六味者無過薛立齊假使九泉有知視近日之湯法盛行能無掩口胡盧哉柴嶼青治案云候補汪某年二十餘因感時氣出疹過服石膏等劑身熱泄瀉兩耳皆聾絶不思食脈之兩尺微弱舌上乾燥毫無津液本屬陰虧況大寒之劑不但傷陽亦且傷陰用麥冬五錢滋陰以清虛熱陳皮以和胃氣加西河柳一錢以清疹毒次日熱微瀉止舌亦覺潤惟左寸脈微洪加小生地二錢木通一錢菊葉一錢三日熱退思食因是月應選身軟耳聾慮不能過堂掣籤謂已平復十九日當投補劑定可全愈後果如言竟得赴選馮楚瞻治案云沈氏兒發熱數日見痧疹才一日面上盡沒神氣困極蛔從口出不一而足數日不食下瀉上喘唇口焦裂五心壯熱手足指尖皆冷脈細數無倫兩尺更弱咸謂疹毒歸臟胃熱故蛔連出也不知神氣欲脫五臟俱困脾虛不能納穀蟲無所食又兼虛火熏蒸臟腑燥熱蟲不安而出耳況諸斑疹多由內傷失調脾胃不足以榮是以陽氣逆行陰覆於外血盛氣壯則色紅而焮發血虛氣弱則色白而隱伏有何毒之輕重乎面上退縮者陽虛不能升發也喘促者氣唯續也唇焦者脾津耗竭也五心壯熱者陰虧火爍也泄瀉不食者真火衰而脾不運也寸關細數尺弱者氣虛血虛虛火上浮而不藏也急則治標緩則治本今者之急本氣欲脫也倘謂痧疹餘毒解利清托恐神氣先盡矣乃以熟地六錢丹皮一錢麥冬三錢牛膝二錢制附六分一劑假熱全消真虛畢露神氣更倦此陰已少復當補氣以助其發生前方另煎人參二錢沖服神氣漸復喘促全安飲粥微嘔乃胃氣久虛之故也再用前方加炒黃白朮二錢去丹皮仍以參湯沖服四劑全愈呂用晦治案云姚江錢嶢都子五歲病疹泄瀉兒醫謂瘄毒最宜於瀉不復顧忌以清火為急寒涼縱進病勢殊劇來邀余視面色兩顴嫩紅時咬牙喘急口渴甚飲水不絶脈洪緩如平壯人余曰脾急矣速投人參白朮當歸黃耆陳皮甘草茯苓木香以救之一劑覺安次日有鄰族人來候驚阻之曰誤矣小兒有專門豈可令腐儒治之吾所聞瘄病以發散清涼解毒為主今半身瘄潮未退而用溫補必不救矣其家懼遂不敢再服間二日嶢都復來見余曰諸證復如故如何余曰豈有是理哉君戲我耳曰日來實不服尊劑乃述其故余曰君試急歸令郎天柱倒矣別去頃之馳至曰果如公言奈何急服前方何如余曰前方救虛也今加寒矣非桂附不能挽也曰顴紅喘急口渴飲水俱是熱證而公獨言虛寒何也曰陰竭於內陽散於外而寒涼復逼之陽無所歸內真寒而外假熱此立齊先生所發內經微旨非深究精蘊者不能信也嶢都歸違衆服之一劑而天柱直二劑而喘渴止三劑起行嬉戲戶外舒馳遠治案云老庚者年二十有七夏月出疹頭身微熱苗色淡紅咽喉痛甚時醫誤用柴葛牛子甘桔等藥轉加作泄大泄數次疹頓沉沒咽喉轉閉口不能言人事恍惚暈眩欲絶時天有在坐余謂天有曰此證全是一團陰寒在裡若用疹家通套藥必不可生天有曰何以言之余曰若內實有火苗當紫赤何得淡紅且咽喉雖痛而不赤腫又無煩渴惡熱等症明明腎臟虛寒陰火上攻也且陽和布令百體順昌痧疹屬陽必純陽始得出透見點之時如萌芽初吐遇陰慘肅殺之氣摧殘所生靡有孑遺今值此陰邪橫發埋沒真陽而疹不沉沒者幾希矣惟是陡進附子乾薑半夏甘草白朮茯苓肉桂黃耆溫補兼行以驅陰回陽俾駁劣悉返沖和乃得功收再造危乎微乎霖按此三案大同小異要是千百中一二未可執為程法也大抵痧疹之發干諸肺胃治之但宜松透一切溫燥補澀之劑不可入也然雖非正治存之以備一格耳又云從侄經千年三十出疹初熱時心中煩躁腹內疼熱甚為剝床彼因問三豆湯可服乎余曰可急煎服於是心腹煩熱乃解苗不出現人事暈眩咳逆喘促鼻靨煽動詳察其證知其為熱毒壅塞於肺肺壅則津液不行肌竅不開苗故不見因用黃芩以清裡熱阿膠麥冬以潤肺燥桔梗開提肺氣柴葛蒡薄清解外熱甘草緩中杏仁定喘服二劑苗雖出透而色皆紫黑人事更覺沉重飲食一點不能下余悄謂其家曰疹書有云淡紅者生紫黑者死其家駭怖無似余復安之曰豈真死證耶但其證極險耳此為內熱甚而血結也其證舌乾口臭惡熱喜冷聲音響亮仍用黃芩麥冬阿膠以清內熱而潤肺燥加以丹皮瀉血中之熱合紅花之活血者以散血結蟬蛻牛蒡解其外毒黃連甘草解其內毒連進三劑人事漸安飲食漸可紫黑漸退而痧疹塌矣然有陰邪內盛者苗亦紫黑法宜驅陰回陽其證舌潤不渴聲低息短惡寒喜熱與此不同又云天瑞之子大熱大渴舌乾口苦咽喉腫痹氣喘腹痛下痢紅白小便赤熱苗色紫而暗滯此為火邪充斥三焦俱為熱壅傷津而渴觸肺而喘上攻而為喉痹下迫而便紅白精津血脈受其煎熬故苗色不紅活口苦者少陽之裡熱也方用柴胡黃芩清解少陽大黃通瀉三焦實熱梔子引三焦之火屈曲下行生地紫草以解血分之熱杏仁定喘桔梗開提甘草和中服一劑諸證略殺但腹痛未減小便如故是夜用神砂六一散二錢桔梗煎湯化服使桔梗通天氣於地道則氣不滯而壅自疏六一散開支河以瀉小腸之熱一服而小便通腹痛即愈次日苗轉紅活諸證俱已於是方中減去柴胡黃芩大黃梔仁更加當歸茯苓數劑而痊愈矣許宣治治案云胡旭如子三歲秋間患瘧痢兩月未痊正氣大虧傳染出疹發熱咳嗽痧點隱隱淡白不現氣不足以息目無神四肢冷余曰痧初見無補法此兒正氣虛當破格用藥因以荊防蟬蛻前胡各四分人參升麻甘草桔梗各三分生薑少許一劑而痧透除去升麻加入牛蒡二劑而喘息定痧漸退又云畢以時女冬至出痧疹胃火本盛唇燥舌苔嘔渴疹方出未透忽受寒邪鼻煽喘促嗽聲不出面色青四肢冷延余視時勢已危矣余用麻黃蘇葉前胡杏仁防風荊芥各五分芫荽一錢石膏一兩投藥後暖覆片時火勢盡發除去麻黃蘇葉加入桔梗連翹山梔牛蒡四味又一服滿口發出白瘡糜爛不能食除去荊防芫荽再加花粉木通數日而痊又云張錦雯孫女出疹四朝面上已收熱已退忽然腹痛啼叫四肢冷悶倒在地余曰疹已四朝出透熱退今忽腹痛是蟲動也無熱證黃連即不可用烏梅又不可用正躊躇間適有棐在盤即命以棐肉十枚搗碎煎水飲之不移時而止藥貴當不在峻與緩也又云張佩西長孫文芳隆冬出疹發熱嘔吐痧點隱隱不透延余至初用疏托藥服後嘔吐不止心煩燥渴至夜乃於疏托藥中加石膏五錢吐仍不止長蟲出少停又吐又出長蟲至夜半共計吐出長蟲一十八條忽然人事昏悶四肢厥冷一息奄奄欲絶余見其舉家驚惶亦難措手因思生死關頭在此一刻無可推委乃復切其脈滑數有力遂放膽用藥緣此子胃火本盛加以紅爐密室疊障重茵火鬱於內則肺胃傷津液竭表氣不通故得得欲嘔嘔甚則蟲不得安故隨嘔而出忽然昏悶厥冷者乃壯火食氣熱深者厥亦深參之唇舌全是火證前所用升麻石膏而不效者病重而藥劑輕也乃用石膏四兩知母黃連山梔花粉各一錢升麻葛根防風荊芥赤芍牛蒡各六分芫荽八分甘草四分一劑之後反令揭去重裘臥未逾時火勢盡發壯熱面赤痧出如堆再進一服橫身皆透熱勢漸減熱減則藥亦當退除去荊防芫荽黃連加入連翹木通石膏減半至晚熱復甚心煩燥渴無可如何復用黃連石膏如前數始得安臥熱平二三日痧色焦紫不退知其熱甚傷陰乃用養陰退陽之劑生地五錢丹皮麥冬各三錢桔梗牛蒡梔仁花粉各一錢石膏五錢甘草五分守過七朝共計服過石膏二斤黃連一兩治痧疹數十年火證之甚無過於此當昏悶厥逆之時傍有慮其昏脫者命煎獨參湯灌之非餘力主清涼頃成不救矣籲可畏哉又云江氏子出疹七朝下痢日夜近百度後重紅白發熱煩渴余用升麻石膏桔梗甘草枳殼木通黃芩黃連一劑而痢減半能食粥二劑止又云吳氏子疹出三朝熱甚煩渴喘嗽音啞其兒缺乳三歲不能行兼之提散太過肺氣與陰液皆虧大劑養陰生地二錢麥冬二錢沙參一錢丹皮八分桔梗八分甘草五分炒梔子八分知母八分加梨汁半杯沖服服藥後喘漸定熱漸平安臥片時陰得所養連服數劑嗽減音開調理而愈此證若周旋俗手用提散藥死矣又云曹序林先生次孫三歲出痧體素弱三朝熱未退兩頰未透唇口乾燥精神困倦咳無力大便日五六次正氣已虧難循常法方用人參麥冬桔梗防風炒梔子茯苓甘草二劑而泄止疹透精神漸轉惟咳嗽未平人參易沙參再加牛蒡北杏仁二劑痰嗽漸減猶有餘熱再加丹皮料豆二劑而痊痧證用人參昔曾治胡旭如子痢後出痧升麻葛根湯中加用取效今已三十年始得再用痧疹固宜清與散有正氣虛不能任藥者亦宜活法故記之又云孫兒炎壽出痧已過七朝四五朝少服疏表一劑痧沒後熱未退人事不爽知其肺家餘毒未清至九朝午後熱甚口舌生瘡有時痰嗽氣促熱退時脈平小熱來時脈數大熱服清熱保肺之劑安臥能乳人事理宜清爽而大勢沉困呻吟不定故復論之大熱七日多汗表氣與陰液皆虛也小便清利裡熱亦降也大便泄且多次黃黑色雖為夾熱下痢腸胃亦虛也唇舌瘡是心脾二家蘊熱所發餂乳無所苦亦無大害且既發為口瘡其無內陷可知也食乳飲藥之後不移時便泄不能停蓄腸胃愈虛也痰嗽喘促無已時者為實為閉有時而止安臥而定非實閉也是肺金受火邪之克正氣虛痰不運行也合而論之雖曰餘熱尚存當以正氣為主酌以補而不滯之劑治之人參三分麥冬六分橘紅三分茯苓六分料豆一錢地骨皮五分炒梔子五分桔梗五分甘草三分卯時服藥辰巳二時相安午後復發熱呻吟唇紅面赤脈來滑數肺熱猶甚人參易沙參再加枯芩三分服藥後熱又漸平十朝心脾二經熱平故午前退肺熱仍在故午後猶熱熱來時呻吟脈大唇紅頰赤眼角生脂書云臟腑之傷肺則尤甚是以昨加黃芩得效因思病重藥輕雖效而熱難盡除前方用沙參再守一劑十一朝午前安靜午後猶熱熱則痰嗽氣促欲除痰當清熱欲平熱當養陰痧後養陰退陽千古大法生地麥冬丹皮料豆炒梔子叭膽杏仁橘紅茯苓牛蒡子桔梗甘草十二朝午熱減半精神漸轉前方再守一劑十三朝停藥十四朝右腮發紅午後又熱口瘡又發舌尖下一大瘡金黃色復與清心之劑連翹山梔桔梗甘草牛蒡子貝母麥冬料豆枳殼木通二劑平矣痘證多心脾熱故多用黃連痧疹多肺熱故宜黃芩山梔黃芩有二種一種色黃而中空者一種色緑而中實者中空者名枯芩肺欲空故宜之中實者名條芩又名子芩腸欲實故宜之痧疹用枯芩不必酒炒止痢安胎皆用條芩又云西溪文學汪聚之年二十八胃中素有停飲丙辰仲春傳染出痧初服升麻葛根湯加荊防蟬蛻甘桔痧疹應藥而出疏疏表透煩熱不寧二朝再用前方痧出始透面部胸背綿密如堆顏色焦紫唇裂舌苔煩躁依然不定據此痧證理應重用清涼自言胸中痞悶不時咯出寒痰青白色本證宜溫痧出火甚宜清權宜之計當重治痧一邊四朝荊防甘桔少加連翹赤芍炒山梔之類煩雖有時而定寒痰湧出日夜各一二盂外證唇裂口乾大便不解石膏雖不敢用清潤之品加入花粉麥冬二味服藥片時寒痰湧起胃中閉塞外見痧色焦紫唇裂音啞用藥實在兩難躊躇再四淡劑守之至五朝視其表已盡透痧色微有回意所苦者胸閉耳遂與二陳甘桔杏仁炒梔子之類藥入相安食少加守定二陳以平飲甘桔以開音守過七朝飲平熱退音亦漸開如此火毒燔灼而芩連石膏竟不能用麥冬之不受者飲不利於滋炒梔子之可用者苦降而不泥膈也此實用藥相機之權宜日與其令伯守明先生斟酌立方始終不用苦寒大便解而裡熱泄旬日收功若遇偏執之流孟浪之手胃氣一傷鮮有不敗事者用藥之難執成方以應變可乎又云南源方氏子九歲長夏出疹兩頰未透醫者不識時勢用升麻葛根不應誤加麻黃一劑疹出而大汗神困煩渴喘促又不知轉手養陰救肺以致胸骨高起如嗽久龜胸之狀請余治余曰痧疹表不透當提散夏令表虛提散太過六腑之火盡發肺受其殃熱擁胸膈勢已危矣急用生沙參麥冬料豆各二錢丹皮一錢石膏五錢枯芩杏仁桔梗木通各五分枳殼甘草各三分一劑熱勢稍平除去木通枳殼加入梔仁地骨熱退七八守服養陰數劑胸骨漸平其次子七歲疹後潮熱十餘日咳嗽喉痛米粒難吞四肢痿軟不能坐立其初出亦曾服過麻黃余曰此表散太過津液盡奪肺熱葉焦發為痿蹶有自來矣亦宜瀉火保金使津液漸回庶幾可治方用生沙參麥冬各二錢石膏三錢桔梗梔仁山豆根地骨牛蒡杏仁料豆各一錢枳殼甘草各三分一劑喉痛止二劑能食粥除去梔仁枳殼五六劑而能行矣龜胸肺痿二證疹後所未見者故續記之若非過用提散誤用麻黃當無此證夏令治疹醫者可不慎乎余春山治案云戊申夏月有程姓延余治疹肩輿未到已斃詢問其故云出疹已兩日據醫云疹發未透數進升麻葛根湯而煩渴不已隨即疹沒煩躁醫云疹為風閉令著復衣關閉房內冀其復出兒未能語惟將手貼冷處少安且欲扯門環外出之勢均禁不許遂發痙而亡吾鄉有盦麻之說貽誤已久醫家病家未知改悟惜哉此兒之命明系熱鬱亡陰邪陷風動致殆也余到之日第二兒亦發熱關閉房內啼哭極甚余急令抱出其家仍懼感風余曰前證既經關閉房內損傷姑易舊章試看如何適出房外哭遂止余令脫去夾衣笑容可掬余曰病未經藥已去大半矣舉家均以為奇再與清燥衛生湯方用生石膏知母蔞皮蘆根南沙參杏仁薑汁炒木通生牛子當歸細辛梨皮芹汁服一劑次早疹出鮮活傍暮疹遂沒舉家復憂疑是房外感風疹閉余曰無慮兒既安然乳食且已退熱此是邪輕因治得法一藥而愈惟咳嗽未止餘邪未清令用杏仁麥冬蘆根梨皮煎茶頻飲痊愈其家方知前幾誤治章虛谷治案云孝廉黃笑山先生令媛年十餘歲出瘄見點已五日經幼科以常例升提表散之藥治之其毒總不透發氣喘鼻煽日夜煩擾其狀甚危余診脈虛弱帶數惟左關尺沉弦而滯知為腎肝蘊毒未出乃重用玄參佐知母歸鬚赤芍犀角羚羊連翹甘草一劑服之其夜即能稍睡次日脈象鬆動惟口大渴猶喘急鼻煽是熱毒已達肺胃又重加石膏數劑後漸安而愈蓋玄參滋水解毒能啓發腎氣歸鬚赤芍疏通血絡犀羚皆透發之品與連翹知母甘草從手足厥陰引毒直達肺胃從表而出故一劑即效可見確為內毒未出而世俗皆認作外毒內陷惟屢用升散大泄肺氣以致喘急煩擾而危殆者不可計數良由平素未明此理故也吾願天下後世切須究心勿泥成法勿拘舊說庶可保全生命再按是證乃熱毒內伏故以清涼透發見效其有先天元陽薄弱而毒難轉化者於涼透之劑稍佐附子助其元陽送毒而出否則難以透發此在臨證者隨宜變化即此一證可以隅反也王孟英治案云溽暑之令瘄疹盛行幼科僅知套藥升柴防葛亂施殆亦疫癘之病造化默行其殺運歟陳仰山家患此者十餘人其長郎書芾孝廉之女勢最劇以瘄甫出而汛至也醫者卻走始延余視之脈滑而數舌絳大渴面赤失音不食便瀉曰此由發散太過火盛風熾氣血兩燔氣分之邪由瀉而略泄其焰營分之熱由汛而稍解其焚豈可畏其脫陷妄投止澀耶與西洋參石膏知母麥冬犀角生地連翹甘草石斛丹皮桑葉竹葉大劑投之三日而愈養陰善後遂以漸安其餘或輕或重餘一以清解而痊又云李新畲仲郎瘄未齊而痰嗽氣喘苔色白滑小溲不赤或主犀角地黃湯加紫雪服而不效延余診之右脈洪滑而口渴乃天時酷熱暑邪薄肺挾其素有之痰而阻其治節所以氣機不行而疹不能達苔不能化溺不能赤也溫散大忌涼血亦非與竹葉石膏湯合葦莖加杏菀旋杷海石投之氣平疹透苔退舌紅小便亦赤數日而愈又云徐艮生室年四十餘於酷暑之時患瘄所親沈悅亭連與清解不能殺其勢為邀余視之體厚痰多脈甚滑數揚擲譫妄舌絳面赤渴飲便澀乃與大劑白虎加犀角玄參銀花花粉貝母竹黃竹葉竹茹竹瀝送滾痰丸服後大便下如膠漆脈證漸和數日後去丸藥其勢復劇甚至發厥仍加丸藥乃平如是者三次險浪始息悅亭復以白金丸滌其膈下留痰續用甘涼濡潤法充津液而搜餘熱漸以告愈沈岷源奇證匯云王燮庵幼時痧後食酸太過咳嗆不已年餘骨立五心煩熱已近童勞一人教於每日黎明以頭窠雞子一枚打千餘下入鹽少許沸湯瀹服百日而痊霖按選案數十條諸法略備近時運當燥火多宜清透但釀熱為痰阻其氣機使疹毒不能透達時醫不察只知表散徒傷真陰因此致斃者多矣王孟英治李新畲徐艮生兩案極有膽識然熱證熱痰尚不難措手觀許宣治治汪聚之以熱證而素蓄寒痰就機宣導尤非易易其素本怯弱之兒因表散太過氣虛不能送毒外出如余春山等主以甘寒育陰是矣總不若章虛谷清透劑內重加玄參壯水養陰而不膩遇元陽薄弱者於此中稍佐附子尤有卓識至孫文垣之利水泄熱吳橋之熏蒸透毒各寓精義學者皆當究心探討因病制宜勿拘拘於一格也
