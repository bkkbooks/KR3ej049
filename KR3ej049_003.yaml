body:
  text: 卷三論治下張石頑曰麻疹者手足太陰陽明二經蘊熱所發小兒居多大人亦時有之是亦時氣傳染之類其發熱時多咳嗽多嚏多嘔眼中如淚面浮腮赤多瀉多痰多熱多渴多煩悶甚則躁亂咽痛唇焦神昏通身紅赤起而成粒勻淨而小斜目視之隱隱皮膚之下以手摸之磊磊肌肉之間其形若疥其色若丹以其陽氣從上故頭面愈多者為順法當清涼發散為主藥用辛散以升發之涼潤以清解之切忌酸收凡動氣燥悍及一切溫補之藥慎不可犯誤用禍不旋踵辛散如荊芥薄荷前胡葛根麻黃石膏鼠黏子涼潤如玄參栝蔞根葳蕤麥冬生甘草芩連貝母連翹竹葉皆應用之藥又當隨所發月時量兒大小及見證輕重而為製劑若漸出漸收者其勢雖輕而熱尚未平須防喘急若連綿三四日者其勢雖盛而熱已發泄必無他變宜大青湯或消毒飲加玄參石膏麥冬竹葉若發熱時遍身汗出或衄血者此毒解也勿遽止之若汗出太多血流不止當以清肺湯去款冬杏仁加麻黃根以斂汗犀角地黃湯以止血遲則氣虛神耗為難治也若發熱時或嘔吐或自利者此火邪內逼毒氣上下行也俱宜清熱解毒利小便切勿止澀大凡疹症發熱時未有不渴者但當與緑豆燈芯煎湯勿與冷飲致成水蓄多生變幻也即葷腥酒面生冷水果咸須禁之麻疹多有熱痰在肺初發時必咳嗽宜清熱透表不得止嗽麻後咳嗽切忌辛溫酸澀但用清咽滋肺湯以清餘熱痰壅自愈多喘者熱邪壅肺也切勿定喘惟應大劑竹葉石膏湯去半夏加貝母玄參薄荷如冬天寒甚麻毒為寒鬱於內不得透出而喘加蜜酒炒麻黃一劑立止夏月熱勢甚者即用白虎湯加竹葉忌用升麻誤服必喘然喘為肺氣壅遏故喘必兼嗽而張口抬肩者肺竅不通不治也故諺有喘而咳嗽者可療喘而不嗽者難醫之語又其證多泄瀉慎勿止澀惟宜芩連葛根則瀉自止疹家不忌瀉瀉則陽明之邪熱得解是亦表裡分消之義又有疹收之後飲食如常卒然心腹絞痛遍身冷汗如冰者此元氣虛弱而中惡氣也朝發夕死勿妄治之凡麻疹以鮮明似錦為吉黑晦如煤最凶頭面不出者重紅紫黯慘者重咽喉腫痛不食者重黑黯乾枯一出即沒者不治鼻煽張目無神者不治鼻青糞黑者不治牙疳臭爛者不治疹之牙疳最為難治外用無比散吹之內服加味清胃散更加荊芥石膏緩則不救疹中諸患不宜依證施治惟當治本本者手太陰足陽明二經之邪熱也解其邪熱則諸證自退矣有夾痘而出者此毒氣太盛故一齊湧出不必治疹但當托痘為主然治痘宜溫治疹宜涼此又不可不審大人男婦出疹當與外感並治惟清涼解表隨天時寒暑施治凡麻痘並作臟腑風熱交患也麻乃風邪外感豆為胎毒內發二者相雜赤暈發焮多有誤認痘出太密而委之不救殊不知其為疹夾痘也當與化斑湯續續頻進麻毒解而痘自起矣大青湯治斑子熱毒石膏生知母大青玄參生地甘草炙木通荊芥竹葉水煎服消毒飲治痘疹咽痛而起發遲鼠黏子研錢半甘草五分荊芥一錢水煎日二服清肺湯治痘疹肺熱喘嗽吐痰桔梗甘草麥門冬款冬花杏仁貝母牛蒡子水煎服犀角地黃湯治傷寒溫病一應發汗而不得汗內蓄血及鼻衄吐血不盡內余瘀血大便血面黃或中脘作痛犀角生地黃酒浸另搗牡丹皮白芍等分上四味水煎去滓入地黃再煎數沸濾清服喜妄如狂加大黃黃芩脈大來遲腹不滿而自言滿者加當歸肉桂吐衄加藕汁側柏童便清咽滋肺湯治麻後餘熱咳嗽聲喑玄參荊芥葳蕤鼠黏子麥門冬貝母去心枳殼桔梗栝蔞根馬兜鈴藿香丹皮扁豆赤芍等分甘草減半為散每服三四錢加生薑一片水煎服竹葉石膏湯治大病後煩熱作渴竹葉人參甘草炙石膏生用碎粳米半夏麥門冬水煎溫服白虎湯治熱病壯熱煩渴及中暍煩熱而渴石膏八錢生用碎知母三錢甘草一錢炙粳米半合水煎溫分三服一日盡飲之無比散治麻後牙疳腐爛取黃牛糞煅存性入龍腦少許研細吹之加味清胃散治斑疹口舌生瘡齒齦腐爛生地黃升麻當歸牡丹皮川連酒蒸犀角連翹生甘草為散水煎去滓細細呷之半日再服化斑湯治痘與斑夾出用此消斑起痘鼠黏子一錢玄參二錢柴胡八分荊芥六分生甘草四分連翹七分防風六分木通八分淡竹葉十五片枳殼七分蟬蛻五分燈芯二十莖水煎溫日二三服有種行漿疹子極似痘最難看然痘則必有頂盤疹雖有漿而頭粒必不堅根盤必無紅暈也疹後痘不結痂乃元氣虧損當大補脾胃為主不可誤認邪熱未盡復與清熱退火之藥麻疹俗名痧子浙人呼為瘄子麻病風熱人或未知痧之與瘄字學不收皆土音習俗之訛耳原其證之輕重今昔懸殊吾吳水土濡弱之鄉生氣最易萌動故麻疹之發自始至終不過二三日即安從古迄今靡不皆然邇來風氣變遷有似北方氣候即尋常麻疹必六七日乃化消若熱勢未盡或觸風寒或犯飲食變證百出其危有甚於痘者因遍考方書從無麻疹專學間有一二及此無非附見痘疹之未一皆簡略不詳何怪兒科之莫能舉措且以痘方混治曷知麻屬陽陽從陰化故外出內沒而不漿痘屬陰陰從陽化當外疏內托以助膿二者相去天淵烏可不辨然皆為嬰孺説也但今不特嬰孺少壯每多患此雖當參詳診切仍不能捨此繩墨而臨證之機活法在乎心手繩墨又不可拘也霖按正字通麻風熱病本作淋玉篇隱疹皮外小起也是痘疹痧疹麻疹皆指其形似而言若拘牽字學則專治或出或不出之風熱時麻而轉將人人不免之伏氣痧疹置之不問因字害義石頑老人未免疏漏矣發熱麻痘之初必由發熱但痘熱不過二三日即出麻熱有六七日或半月乃出或乍涼乍熱或壯熱經日不退始熱之際必見面赤眼腫多涕淚咳嗽連聲是其候也熱甚經日不退曰壯熱惟正出時為正候若初發壯熱至已出而熱不少衰者其證必重清熱透肌湯出盡而壯熱不退者竹葉石膏湯方見前去半夏加荊芥玄參沒後而壯熱不退者危急需涼解為主其有熱數日止而復作者有早熱而暮退者在初發時為熱邪末透葛根解肌湯正出之際而煩熱轉甚乃邪熱未解而復內攻也清熱透肌湯沒後見者為餘邪未盡四物湯換生地赤芍加連翹玄參亦有麻退身涼越六七日而復熱者非餘熱未清即復感風邪當以意消息或因大病之後中氣虛而然者治本為要臨病之機不可不審也清熱透肌湯治麻疹未透熱甚而咳玄參石膏鼠黏子荊芥防風前胡葛根杏仁等分生甘草減半水煎熱服葛根解肌湯治麻疹初起發熱咳嗽或乍涼乍熱葛根前胡鼠黏子荊芥連翹赤芍蟬蛻木通等分生甘草減半水煎熱服四物湯治營血虛熱熟地黃二錢當歸身一錢白芍錢半川芎八分上四味水煎溫服肥盛多濕痰及嘔逆少食便清者禁用部位麻屬腑候發則先動陽分而後歸陰經一身之中陽部宜多陰部宜少陽部宜透陰部即不透亦可無慮若陰部多而陽部反少不透者為險防有他變陽部者頭面背四肢向外者皆為陽陰部者胸腹腰四肢向內者皆為陰也凡發自頭至足為齊頭面多者為順先從胸腹暖處起漸發四肢者順如從手足起漸發胸腹背者逆形色色貴紅潤形貴尖聳若色雖紅潤而不起二便艱澀者清熱透肌湯方見前如色淡不起二便如常此屬本虛兼當培養氣血亦有色黯不起大便祕結唇舌燥赤者為火邪內郁白虎湯方見前加玄參荊芥其有色白不分肉地惟點粒高聳晬時即沒者邪熱本輕也然有表氣本虛而色白者調護溫暖一二日自變紅活也若正出時為風寒所遏而色白如膚必毛竅悚栗葛根解肌湯方見前或麻出成片一被風寒便變為白身不發熱而反內攻煩躁腹痛痰喘氣急者危如毒攻於胃則嘔吐清水攻於脾則腹脹不食攻於肺則鼻塞喘促攻於心包則唇舌焦燥不省人事搖頭掣手攻於腎肝則變黑而不救也若色紫赤而黯是火毒熾盛頂粒起者可治宜涼血飲子讝語煩躁者黃連解毒湯方見前萬氏論中調益元散枯燥不起者難治若頂粒焦者無論紅淡皆為熱劇之候並宜白虎湯方見前重用石膏乾燥無汗加麻黃以汗之大便祕者涼膈散下之亦有麻發如雲頭大片其形有二一者大片焮赤一者大片之上覆有小紅點粒皆火邪熾盛所致白虎湯加玄參竹葉若麻出斑斕如錦紋或出膿血腥臭不幹心胸煩悶嘔吐清水身溫熱者白虎湯加黃芩茅朮若初發時有似斑屑者乃風寒在表而成隱疹只宜疏解俟麻一透其疹自退切勿認為斑而與苦寒之劑致麻內陷而難救也涼血飲子治麻疹火毒熾盛紫赤而黯黃連五分黃芩一錢大生地錢半荊芥一錢玄參一錢赤芍藥八分紅花三分木通七分牡丹皮八分水煎溫服益元散一名天水散一名六一散治暑月小便不利滑石水飛六兩甘草炙六錢生四錢為散清水調服二三錢發散溫病熱病加蔥白五七莖香豉四合水煎溫服老人虛人及病後傷津小便不利禁用此方加蔥豉煎服則兼散表邪加吳茱萸則治白痢加紅曲則治血痢加炮薑則兼消飲食加硃砂則兼退心火加青黛則散肝火加薄荷則清肺熱加石膏則除胃熱其入通聖雙解解毒等方隨證配合未遑枚舉涼膈散治溫熱時行表裡實熱及心火亢盛目赤便祕胃熱發斑大黃酒浸二兩芒硝一兩連翹一兩黃芩一兩甘草炙六錢山梔八錢薄荷七錢為散每服四五錢加竹葉十五片水煎溫日三夜二服得下熱退為度世本無竹葉有薑一片棗一枚蔥一莖硝黃得枳朴之重著則下熱承之而順下得芩梔翹薄之輕揚則上熱抑之而下清此承氣涼膈之所攸分也用甘草者即調胃承氣之義也局方專主溫熱時行故用竹葉若治感冒之證從世本用蔥白薑棗可也咳嗽麻疹乾咳連聲不斷是火邪凌爍肺金所致然咳則毛竅開而麻易出故未出之先最喜咳甚發透其咳自己若出盡及沒後而咳仍不止者清咽滋肺湯方見前咳嗽多痰去麥冬加橘皮茯苓其有感觸風寒咳嗽煩悶嘔逆清水眼赤咽痛口舌生瘡者甘桔湯加芩連沒後見者人參白虎湯去知母易麥冬以滋化之甘桔湯治麻疹咽痛口舌生瘡甘草桔梗山豆根玄參鼠黏子荊芥等分麥門冬倍用水煎溫服人參白虎湯治熱病舌乾大渴發熱背寒人參一錢石膏八錢生用碎知母三錢粳米半合甘草一錢炙水煎溫分三服一日盡飲之汗麻發之際常宜微汗微汗則肌腠疏豁而邪易透不可復用升發升發恐汗大泄不無亡陽之慮其有隱陷不透之壞證用權升發得大汗而解者此特語其變也若壯熱無汗而皮膚乾燥者必風寒壅滯難出多成內攻之候或腹脹痛或發喘促宜與葛根解肌湯方見前冬月越脾三拗選用但不可過劑亦有因熱極火鬱皮膚乾燥而難出者必致唇舌燥裂二便祕澀壯熱昏沉或身體脹痛喘促痰鳴無論何時急宜白虎湯方見前加玄參牛蒡芥梔竹葉之類大抵麻證常以微汗為順若始終無汗雖沒後不無餘咎其治總不逾上法也越脾湯治風水惡寒一身悉腫脈浮不渴續自汗出無大熱者麻黃去節甘草炙石膏生薑大棗水煎溫服三拗湯治風寒傷肺而咳誤行斂肺而壅嗽喘急麻黃不去節甘草生杏仁連皮尖更加荊芥桔梗名加味三拗湯嚏麻疹初起而多嚏者是內火因風邪激搏而然正出時有嚏者其候必輕如沒後尚有嚏者邪熱盡解可無餘患矣如嚏而多涕者濁壅得泄肺氣自清最為吉兆若無嚏而鼻塞不通必有風邪留滯宜辛涼之劑以透達者嘔吐麻之初起吐瀉交作者順乾霍亂者逆欲吐不吐者危嘔吐是胃中熱邪不得發泄而作葛根解肌湯方見前正出及正沒時見者消毒飲方見前加枳實黃連多痰者更加貝母栝蔞根若沒後而嘔者脾胃虛而熱滯也石斛清胃散其有嘔而吐蛔者胃中痰熱膠固蟲無所養而上竄也能食即定如蛔出多而不能食為胃敗不治石斛清胃散治麻後嘔吐胃虛不食熱滯石斛茯苓橘皮生薑一片蔥白一莖水煎溫服血熱者加紫草連翹泄瀉泄瀉為麻疹之常候熱邪得以開泄也發熱時瀉而黃赤稠黏小水短澀者屬熱四苓散加木通滑石已出人參白虎湯方見前去知母易麥冬其證必多發渴渴甚不止熱甚不退雖數劑無妨如瀉下清稀白沫腹疼喜得溫按者屬寒胃苓湯去蒼朮加煨薑瀉利窘迫而腹痛脹滿或噯氣如敗卵者為飲食停滯枳殼湯加楂檗木通大抵麻疹泄瀉屬熱者多屬寒者少辨治宜早不可令其瀉久瀉久則正氣下陷或成腫滿或變下利並宜枳實理中之類以理脾胃為主麻後瀉利不止口渴目閉四肢不溫者不治嘔吐不食洞泄不知者不治四苓散治小便赤澀脹痛及溫熱時行煩渴白朮生茯苓豬苓各二錢澤瀉三錢水煎服胃苓湯治飲食停積浮腫泄瀉脈證俱實者厚朴去皮薑汁炒蒼朮泔浸去皮麻油拌炒黃茯苓豬苓甘草炙白朮生陳皮泡去浮白澤瀉桂平胃本平胃氣之墩阜若因脾土之虛不能消運又須稍借參苓如養胃之類然復有土衰不能分利而成腫脹且氣雍不勝參朮難合理中者乃合五苓以健運水土與正氣散之假蘇藿以散客邪兩不移易之定例也枳殼湯治痘疹誤服參耆腹脹喘急枳殼厚朴去皮薑沙炒陳皮泡去浮白甘草炙水煎服目麻疹發熱之時眼光如水而多眵淚或白睛微紅此正候也若沒後猶見紅赤為肺經風熱未盡瀉白散加荊芥薄荷玄參牛蒡閉不欲開更加連翹木通赤而腫痛者風熱上壅也導赤散加荊蒡玄參若為風熱所侵而眼眶赤爛者柴胡飲子急須治之否則為終身痼疾瀉白散治肺熱咳手足心熱桑根皮薑汁和蜜炙地骨皮各一兩甘草炙五錢為散每服四五錢入粳米百粒竹葉一把水煎服加橘紅桔梗名加味瀉白散有熱更加知母黃芩如有客邪禁用或問地骨皮三焦氣分藥瀉白用之何義答言三焦屬腎實則瀉其子也導赤散治小腸實熱小便赤澀生地黃五錢木通甘草梢生各一錢竹葉一握上四味水煎熱服溺血加辰砂五分一方多燈草一方多車前柴胡飲子治風熱眼眶赤爛柴胡羌活赤芍藥桔梗荊芥生地各一錢甘草炙五分水煎熱服發不出初起發熱咳嗽渾身脹痛有似傷寒之候惟乾咳連聲目赤多淚嘔惡便溏確為麻疹之驗若將發之際或為風寒暴襲或因肢體坦露寒鬱熱邪不能外出此全盛之勢未萌與出後沒早不同如氣粗喘促腹中脹痛煩擾不寧而不得出急與麻杏甘石湯或越脾湯方見前去棗重用石膏輕則升麻湯以升發之若因觸犯霧露風寒隱現不能發出以新豬矢沖湯隔簟蒸之冷則更添滾者並取豬矢燒灰蔥白湯下二三錢乃痘瘡黑陷用燒人矢之變法即燒人矢亦能發之仍不出者神丹不能復圖矣麻杏甘石湯治發汗後汗出而喘無大熱者麻黃去節杏仁泡去皮尖搗碎甘草石膏此麻黃湯去桂而兼越脾之意專去上焦濕熱痰氣與苓桂朮甘湯互發彼借苓朮專祛心下之支飲此借石膏專祛膈上之濕熱也升麻湯一名升麻葛根湯治陽明經邪發熱及痘疹初起升麻一錢葛根白芍各錢半甘草炙八分上四味水煎溫服升葛為陽明經之嚮導陽明專主肌肉恐開泄太過即以白芍斂護營血甘草調和中氣所以解利本經邪熱及時行痘疹皆為專藥然在起脹後禁用透表麻疹無問尖大細小必得透表可無後患其有一種匾闊焮赤成塊塊上覆有小粒平塌不起者亦有一片如風毒偏高紅腫但頭粒不尖二者雖透其中必有熱邪留伏防有他變並宜用竹葉石膏湯方見前去半夏以滋化之縱有餘熱從此渙散矣不透表麻出而皮膚乾燥毛竅疏栗不能透表者風寒鬱遏也越脾湯方見前葛根解肌湯方見前隨輕重取用其有表虛不勝疏透者一味蔥白濃煎時時與之但得微汗即解若頭粒隱隱紅紫一片而不透表者火毒熾盛也白虎湯方見前加荊芥玄參如肌膚不燥唇色淡白二便如常而不透者中氣本虛也消毒飲方見前加連翹木通車前茯苓雖有蘊熱不可輕用寒涼即用峻劑升發亦必不能復透但當解利使之內化為主亦有胸背腰腹暖處起發而紅頭面手足乍有乍無此證必纏綿難已且有沒後五七日復發如前二三次而愈者此氣候之異當非不透之比只宜辛涼透表漸次向安欲求速效轉增危殆沒早麻出未經三日或為風寒外郁或熱邪內陷或誤食酸收之物一日半日即沒周身暖處絶無紅影終變危候若雖沒早肌膚暖處尚未全沒急需透表發之不起即當審其所觸而與內解如外為風寒所遏邪反內攻而沒早者消毒飲方見前加蔥頭熱服復透者吉甚則加麻黃穿山甲或越脾三拗選用若不急治必喘脹而死亦有遍身青紫熱腫喘脹氣急此毒滯血凝半匿肌表急投涼膈散方見前去芒硝加麻黃石膏以發越之若腹脹喘促溺澀臍突者涼膈散加葶藶或可救一二若內夾痰熱火毒亢劇而伏匿煩躁或腹脹喘急不省人事者白虎湯方見前加玄參竹葉若誤食酸醋收斂之物伏匿壯熱喘咳煩悶以豬膽汁制甘草煎成續續與之得吐微汗為效或苦瓠生甘草煎湯灌之亦能取吐吐中便有發越之義誤食豕肉喘脹氣急枳殼湯方見前加山楂芒硝以下奪之誤食核桃喘咳聲喑消毒飲方見前加石膏馬兜鈴若得熱退身安氣息漸調者方可無慮或大病之後或洞泄不止中氣本虛不能發越而沒早惟當健運中氣略兼解表清熱若沒後遍身瘙癢者露風早也消風散以疏解之消風散治風熱咳嗽遍身疥瘰小兒瘡疹餘熱川芎羌活防風荊芥穗藿香人參茯苓殭蠶蟬蛻等分甘草炙陳皮厚朴薑製減半上十二味為散每服三四錢茶清調下或用五錢水煎去滓服如久病頭風目翳每日三服效此方妙用全在厚朴人參當知肌表之疾無不由胃而發故用厚朴清理其內即以人參助諸風藥消解風熱於外則羌防荊芥輩方始得力耳難沒西北水土剛徑稟質亦厚麻必五七日乃沒東南風氣柔弱麻出不過二三日即化邇來地運變遷未有不綿延數日者當非難沒之比若三四日後點燥色白隱隱於肌腠而難沒者此必衛氣素微不能焮發或衣被單薄阻其發越之機以致綿延多日法當辛散透達不可遽用寒涼蔽其開泄之路也渴渴若乃肺胃熱盛之候唇口必紅二便祕澀者麥冬甘露飲若二便清利唇色不紅而但渴者此必寒涼太過脾虛不生津液而作渴也七味白朮散去木香加粳米渴而煩躁者是熱邪凌轢心包宜白虎湯方見前加麥冬竹葉正沒時竹葉石膏湯方見前去半夏渴而腹脹者本虛實滯為難治也麥冬甘露飲治麻疹熱甚而渴麥冬二錢去心玄參黃芩栝蔞根連翹各一錢生甘草五分燈芯二十莖竹葉二十片水煎溫服七味白朮散即錢氏白朮散治胃虛津氣不行而渴人參一錢至三錢白朮炒黃一錢至二錢茯苓一錢至一錢半甘草炙六分至一錢煨葛根藿香木香為散每服三四錢水煎日三服喘喘者熱邪壅遏肺竅氣道阻塞而然其證有虛實之分虛者難治實者易調虛則小便清利大便溏泄身無大熱雖清痰潤肺多難獲效實則大便堅燥小便赤澀身發壯熱竹葉石膏湯方見前去半夏加栝蔞仁貝母冬月量加蜜炙麻黃隨手而應若喘而無涕兼之鼻煽者不治大抵未出而喘者易治沒後喘者難治初發之時喘者三拗湯方見前加石膏芽茶喘而鼻乾口燥者白虎湯方見前最捷若見於麻後又宜清咽滋肺湯方見前以滋肺胃白虎湯又為切禁故曰醫不執方治法在人耳氣促氣促多緣肺熱不清所致初發正出時見之清熱透肌湯方見前在正沒沒後清咽滋肺湯方見前如喉中有痰齁䶎齁䶎而鳴者熱邪阻逆不得發越也見於初發正出之間除熱清肺湯正沒沒後見者必邪熱未透或露風沒早餘熱內攻而肺氣受傷也難治除熱清肺湯治麻疹盡透而壯熱咳嗽大便祕結石膏三錢玄參一錢生地黃一錢麥冬去芯一錢半赤芍栝蔞根貝母各一錢甘草五分水煎溫服喑肺胃熱邪為風寒所襲不能盡達於表咳盛咽傷故喑宜清咽滋肺湯見前方若喑而腫痛者射干消毒飲然喑為麻疹之常不可與痘喑比例射干消毒飲治麻疹咳嗽聲喑咽喉腫痛射干玄參連翹鼠黏子荊芥等分甘草減半水煎溫服搐搐為痰熱聚於心包見於初發未透之時清熱透肌湯方見前加栝蔞仁竹葉沒後見者難治只宜輕清之劑調之不可誤用金石痰誕壅盛者一味栝蔞湧吐之若搐無痰鳴或自齧指者非真搐也此為正虛不能主持必死不治衄衄者火邪熾盛血隨火載上行而溢於鼻麻疹初起是為順候其熱得以開泄不治自己若衄之不止或失血者犀角地黃湯方見前加荊芥穗正沒及沒之後仍不止者四物湯方見前加茅根麥冬以滋降之譫妄譫妄是熱邪熾盛於心包若發熱正出時見者為火邪內伏不得透表而致白虎湯方見前加荊芥鼠黏子甚則加麻黃以發越之在正沒沒後並宜竹葉石膏湯方見前去半夏加生地黃以清解之咬牙痘證咬牙有寒熱之分麻疹咬牙皆為熱例乃陽陷於陰故多發渴而手足熱喜飲冷者麥門冬湯加丹皮若手足不熱而反厥冷喜飲熱湯此為熱邪內亢後必下血咽喉作痛痰鳴而死即與白虎湯方見前多不可救麥門冬湯治痘疹便實而渴麥門冬二錢當歸身一錢白芍錢半生地二錢水煎溫服唇燥唇燥多屬脾胃之熱淡而燥者其熱輕赤而燥者其熱深紫黑而燥者熱劇而重也隨輕重以清潤之唇舌破裂唇舌破裂者心脾之火上衝也其色必多深赤初發正出時見之白虎湯方見前加芩連玄參荊芥薄荷若正沒沒後見者為心脾俱絶及紫黑枯燥而血不活者皆難治也口氣口氣穢濁乃熱邪蘊隆於胃清胃散加石膏連翹生甘草其有臭不可聞者此胃敗也不治若其人本有是證不在此例清胃散治胃中蘊熱中脘作痛痛後火氣發泄必作寒熱乃止及齒齦腫痛出血痛引頭腦生地黃四錢升麻錢半牡丹皮五錢當歸川連酒蒸各三錢為散分三服水煎去渣細細呷之半日再服犀角地黃湯專以散瘀為主故用犀芍此則開提胃熱故用升連其後加味清胃則兼二方之制但少芍藥耳舌胎舌者心之苗麻本火候心屬於火故舌多有胎白為肺熱黃為胃熱但當清解疏利更參外證而為施治純黑為心絶黑而濕者熱淫血分黑而燥者熱淫氣分皆為危候並宜白虎湯方見前濕者加生地黃黑參燥者加麥冬竹葉黑色漸退者吉不退者不治口疳牙疳腐爛是熱留陽明餘毒上衝所致加味清胃散方見前加石膏荊芥大便祕者當歸散微利之外用栗根白皮煎湯漱淨以無比散方見前或燒鹽散吹之如通齦色白者自外延入內者無膿血者齒落口臭者喘促痰鳴者皆為不治若滿口唇舌黃赤白爛獨牙齦無恙者此為口瘡非牙疳也胃中餘熱未盡毒壅上焦二便必多艱澀導赤散方見前以瀉心脾之火外以緑袍散敷之當歸散治口舌生瘡牙齦毒發大便祕結當歸赤芍各一錢川芎五分大黃三錢甘草生五分為散加生薑一片水煎服之燒鹽散治牙疳潰爛取橡斗大者實鹽滿殼合起鐵絲扎定燒存性以碗覆地入麝少許研細敷之緑袍散治一切口瘡腐爛荊芥穗薄荷青黛玄明粉硼砂各二錢甘草一錢半百藥煎二錢半為散點舌上令其自化腹痛腹痛之由不一總為火毒內郁或風寒壅遏或飲食停滯者皆能致痛於發熱正出時風寒壅遏毒反內攻而腹痛者急與疏表麻透自己若飲食過傷腹滿脹痛者力為消導其痛自除時當正沒沒未盡而腹痛者兼清中外而痛自止沒後見者分利餘熱其痛自愈又須驗其有無他證屬虛屬實而與治之若熱邪內結而腹痛者通利大便為主有麻後脾氣不調而致腹脹面目四肢浮腫分利小水為要至若元氣大虛陰陽不能升降小水不利遍身浮腫喘促兼見者難治便祕大便祕結火壅血燥而耗津液麻疹大非所宜無論日期前後速宜清潤四順清涼飲甚則涼膈散方見前以通利之慎勿遲延恐麻變焦紫而難救也大抵麻疹自出至沒二便俱不宜祕祕即微利可也四順清涼飲一名四順飲治血熱便祕脈實者當歸赤芍大黃酒蒸甘草各一錢五分水煎入生白蜜一匙熱服按清涼飲治上焦之燥熱故用薄荷之辛散四順飲主下焦之燥結故用大黃之苦寒功用天淵溺澀小便赤澀在初熱正出時熱邪澀滲是為正候沒後見之為餘熱下匿膀胱導赤散方見前加麥冬以滋氣化利之仍不通者必大便祕郁之故大便一通小便自利痢麻之作痢為熱邪內陷在正沒或沒後而痢下色白者黃芩湯加防風枳殼下膿血者白頭翁湯去黃柏加防風或因食積而滯下者枳殼湯方見前加楂柏木通腹中作脹時痛時止者厚朴湯亦有瀉久而成痢者乾薑黃芩黃連人參湯自始至終痢不徹者必有風毒留滯於內則宜解毒行滯而兼疏風實脾庶幾克應如痢下紫黯如癰膿如屋漏水如雞肝色如黑豆汁之類加之氣喘燥渴熱甚發厄噤口不食麻色紫晦者皆死不治黃芩湯一名黃芩芍藥湯治伏氣發溫太陽少陽合病自利白芍三錢甘草炙二錢大棗四枚擘黃芩三錢水煎溫服白頭翁湯治熱利下重白頭翁黃連黃柏秦皮上四味以水七升煮取二升去滓溫服一升不愈更服厚朴湯治脾胃虛寒作脹腹中時痛時止厚朴去皮薑汁炒陳皮泡去浮白甘草炙茯苓乾薑潔古加半夏枳實薑棗乾薑黃芩黃連人參湯治胃虛客熱痞滿乾薑炮人參黃芩川黃連水煎溫服下蟲下蟲多見於沒後此以胃熱少食蟲不能安而下也與過食傷中蟲不能容而下不同但須調其飲食自愈非上出之比不須治之睡麻疹正出時精神困倦沉睡不醒者為逆蓋緣正氣虧損邪火內郁正氣不勝所致若沒後而沉睡不醒者為氣血俱虛補脾養血為要如沒後煩擾而反不得寐是餘火復燃急需滋養陰血虛陽自斂亦有昏睡不知起止掐其頰車合谷不知疼痛似寐非寐無問正出沒後良非吉兆當察其兼見何證而與施治可也不食不食是胃中邪熱熾盛不可強與雖數日不食亦無妨害在初發正出時白虎湯方見前加荊芥麻透熱清自能食也沒後不能食石斛清胃散方見前諒加健運之味元氣委頓者急需培補防有虛羸之患也鼻煽鼻煽者肺將絶也若兼喘滿痰鳴此必不治如咽喉清利無喘滿而精神不減者可治宜滋培肺氣為主沒後見者死胸高麻疹胸高肺熱熾盛而脹也多見於正沒沒後為肺經壞證不治身冷麻為肺胃邪熱所發本屬於陽肢體常宜溫暖若反清冷如冰是為逆也其有沒後遍體溫涼如故獨下體厥冷過膝者為腎敗不治如初出腰已下不熱毒不能透而反漸沒者亦為逆候急當溫養脾腎或有得生者妊娠麻屬火候最易墮胎若初發正出時須驗其色之紅淡熱之重輕而與疏解疏解之中佐以清涼滋血安胎為主四物湯方見前加條芩艾葉荊芥紫蘇之類若胎氣上衝急用苧根艾葉煎湯磨檳榔續進以降之一切實脾行氣溫燥之藥既礙麻疹復傷於氣咸須禁之虛羸麻患既平形體羸瘦精神倦怠飲食減少或咳嗽不止或便泄不已或身熱不除皆真元虧損恐成勞瘵並宜雙和湯去川芎以和之嗽加橘紅貝母咳加麥冬百合瀉加白朮扁豆食難腐化加砂仁穀芽氣血俱虛合四君子湯隨證調之切禁寒涼傷犯脾胃之藥專力資培緩圖平復可也雙和湯治麻後虛羸熟地黃白芍酒炒各一錢黃耆蜜酒炒當歸各七分肉桂三分有熱去之生薑一片炙甘草川芎各四分紅棗一枚去核水煎溫服四君子湯治胃氣虛弱飲食不思倦怠少食人參一錢至三錢白朮炒黃一錢至二錢茯苓一錢至錢半甘草炙六分至一錢上四味水煎空心溫服按四君子乃胃家氣分之專藥胃氣虛而用之功效立見即血虛用四物亦必兼此故八珍之主治不獨氣血兩虛也即血虛者亦須兼用但補氣則偏於四君補血則偏於四物若純用血藥不得陽生之力陰無由以化也方中白朮若治脾胃虛衰大便不實或嘔惡不食合用炒焦方有健運之力如肺胃虛燥咳嗽失血須用陳米飯上蒸過十餘次者則轉濁為清轉燥為潤是以異功散八珍湯及歸脾逍遙等方內並宜蒸者即陰虛乾咳嗽吐白血總無妨礙更加白蜜拌蒸猶為合宜其於輕重炮製之間全在用者之活法權變舉此可以類推三隅矣麻瘡麻後發瘡多緣生水澡浴太早水氣留泊肌腠而發但須日以荊防艾葉煎湯洗之勿用生水亦不可用瘡藥熏塗失治必每歲依期而發雖云小疾亦須慎之霖按石頑論疹分證施治各中窾竅辨舌察色尤多精義然能與人規矩不能與人巧其化裁通便處要在良工消息得之又未可拘守成法也葉香岩曰痧屬陽腑經邪初起必從表治證見頭痛喘急咳嗽氣粗嘔惡一日二日即發者輕三五日者重陽病七日外隱伏不透邪反內攻喘不止必腹痛脹祕悶危矣治法宜苦辛清熱涼膈去硝黃方書謂足陽明胃疹如雲布密或大顆如豆但無根盤方書謂手太陰肺疹但有點粒無片片者用辛散解肌冬月無汗壯熱喘氣用麻杏如華蓋散三拗湯夏月無汗用辛涼解肌葛根前胡薄荷防風香薷牛蒡枳殼桔梗木通之屬古人以表邪口渴即加葛根以其升陽明胃津熱甚煩渴用石膏辛寒解肌無汗忌用凡瘡疹辛涼為宜連翹辛涼翹出衆草能升能清最利幼科能解小兒六經諸熱春令發痧從風溫夏季從暑風暑必兼濕秋令從熱爍燥氣冬月從風寒疹宜通泄泄瀉為順下痢五色者亦無妨惟二便不利者最多凶證治法大忌止瀉痧本六氣客邪風寒暑濕必從火化痧既外發世人皆云邪透孰謂出沒之際升必有降勝必有復常有痧外發身熱不除致咽啞齦腐喘急腹脹下痢不食煩躁昏沉竟以告斃者皆屬裡證不清致變須分三焦受邪孰多或兼別病纍瘁須細體認上焦藥用辛涼中焦藥用苦辛寒下焦藥用鹹寒上焦藥氣味宜以輕肺主氣皮毛屬肺之合外邪宜辛勝里甚宜苦勝若不煩渴病日多邪郁不清可淡滲以泄氣分中焦藥沙火在中為陽明燥化多氣多血用藥氣味苦寒為宜若日多胃津消爍苦則助燥劫津甘寒宜用下焦藥鹹苦為主若熱毒下注成痢不必咸以軟堅但取苦味堅陰燥濕古人以痧為經腑之病忌溫燥澀補所謂痘喜溫暖疹喜清涼也然常有氣弱體虛表散寒涼非法淹淹釀成損怯但陰傷為多救陰必扶持胃汁氣衰者亦有之急當益氣稚年陽體純剛之藥忌用幼科方書歌括曰赤疹遇清涼而消白疹得溫暖而解此溫字即後人酒釀柳木粗草紙木棉紗之屬雖不可不知然近年用者多無益痧疳濕盛熱蒸口舌咽喉疳蝕若不速治有穿腮破頰咽閉喘促告斃矣治之宜早外治另有專方若湯藥方法必輕淡能解上病或清散亦可痧痢乃熱毒內陷與傷寒協熱邪盡則痢止同法忌升提忌補澀輕則分利宣通重則苦寒解毒許宣治曰疹痘形證大略相似治者每嚴於豆而略於疹不知痘之境寬雖見險惡猶可從容圖治疹之境促變生頃刻多不及救故不可不預防也預防之法在病家坐臥欲暖飲食宜淡二語盡之在醫家慎發表三字盡之所謂慎發表者其一體實之兒火毒盛甚發之太過熱壅於上多有氣粗喘閉者醫家見其喘閉復以表藥繼之熱不能降焚灼而死抑思古方升麻葛根湯之用白芍所以和陰也麻黃石膏湯發中有降也其一體虛之兒出每遲滯小經發散元氣已浮醫者謂出未透更重發之疹雖出而陽氣盡拔無陰以攝致喘脫者多矣余用地黃湯加人參納氣歸元曾救一二故凡見體弱之兒顱開面白目無神或瘧痢病後出得遲緩即當照顧元氣不可過行發表或問痘出於臟疹出於腑胃腑也何以痘多胃熱發斑之證肺臟也何以疹多肺閉喘促之證余曰痘出於臟而赴於胃是由臟而之腑胃主肌肉故也疹出於腑而甚於肺是由腑而之臟肺主皮毛故也然則痘之出五臟之毒而胃總受之疹之出六腑之毒而肺總受之所謂先起於陽者出於六腑也後歸於陰者肺受之也痧疹之出不離肺胃兩家喘閉者肺證也煩渴者胃證也冬月因寒喘閉麻黃杏仁為救急之藥治之速疹出喘定而解若夏令出疹麻黃與時不合庸工不識一見喘閉執而用之每多隨藥而死蓋痧疹多火證火甚剋金夏令金虧天人皆病麻黃萬不能受冬月之喘閉有面青唇黯肢冷者故可用麻黃夏月肺氣已虧表氣已開斷無寒證間有肢冷者是陽氣虧不能四達也只可荊防甘桔從輕用藥氣虧甚者可加人參火甚者升麻石膏湯喘定者可治胃熱煩渴者必多汗此純是裡熱即荊防葛根亦不可輕使升麻石膏湯乃對證之藥合之甘桔則肺胃兩家之熱解矣喘閉證在一二朝見汗渴證在五六朝見肺不容邪其變也速胃能容受其變也遲疹之出必先咳嗽不嗽而出非痧疹也出噴嚏者吉肺氣通也盛夏之令火旺金傷保肺為上輕輕一散即宜保肺石膏梨汁二味最妙石膏一味為痧疹之至寶色白屬金味甘微辛升中有降降中有升雖為清胃之藥實保肺之靈丹也刑金之火由胃而來石膏本清胃之藥而清肺者是與之去路也夏月無麻黃證其有不出者是正氣為熱所傷不能升舉疏托中宜兼益氣是余得心之處其有富貴之家痧毒本甚更加郁遏太過火甚金傷致生喘促者經謂壯火食氣是也急宜瀉火保肺不得再行表散亦有貧寒之子破屋當風衣不蔽膝沙毒正出外受寒邪忽生喘促者急宜溫散使表氣宣通痧毒得解否則痧閉頃成不救寒邪外閉火甚傷金二證皆見喘促醫者當知診視寒邪外閉者面色青四肢冷痧點隱隱於皮膚之內鼻煽而聲細微有惡寒之象宜麻黃杏仁蘇葉防風胡荽等味急進一服暖覆片時喘定面赤痧漸出者生若面色如銀者不可治也火甚傷金者壯熱面赤煩躁口渴四肢熱喘息粗而脈洪大心煩嘔吐或吐出長蟲急宜白虎加黃連雖嚴寒之令勿避也前二證一經説明不難分辨復有火毒本甚外感寒邪外雖寒而中實熱又宜表裡雙解古人有麻黃石膏湯余仿其法全活甚多又有火毒本甚父母只知郁遏醫家只知表散內外交熾火極似水反生厥逆之象者書謂熱深厥亦深是也宜白虎湯加黃連若作寒治殆矣治痧疹有三法一升散一降火一養陰善用者升散之中即寓清涼之意養陰之劑不離生髮之機痧點隱隱未透發熱咳嗽有涕淚宜升散兩頰不透宜升散發熱肢冷面不赤唇不燥宜升散喘促鼻煽辨得是表邪宜升散泄瀉日五六行宜升散痧疹已出壯熱不退宜降火嘔吐煩渴吐出長蟲宜降火不食宜降火熱盛爍金而喘宜降火鼻衄宜降火小便不利宜降火喉痛腮腫牙痛口瘡宜降火牙疳臭爛宜降火痧疹三四日後大熱不退宜養陰紫點不收宜養陰脈來數大宜養陰夜熱心煩齘齒宜養陰音啞不清宜養陰目赤羞明宜養陰身癢便燥宜養陰宜升散而不升散重則頃成喘閉輕則餘毒淹纏宜降火而不降火則肺胃受傷或音啞煩渴或牙疳口瘡宜養陰而不養陰則午後潮熱肌膚瘦削漸成疳證痧出總要表透表一透裡熱雖甚清之可愈表未透毒陷於中門戶一關發表不可養陰又不可多致因循而死表透者非皮毛之表要從臟腑透出沒得從容才得表透亦有火毒甚外見繁紅沒後猶作牙疳肺癰者或鼻衄下痢者臟腑之毒未透出也痧痘之毒由臟腑而出雖已到表而根蒂在裡解字從表化字從里表雖解而里不化其為後患實多肺主皮毛痧疹雖出於六腑必從皮毛而解故不離乎肺解之不透久咳潮熱纍成痧疳此疳字非疳積之疳因其潮熱肌瘦有似乎疳耳治宜潤肺為主辛燥藥用不得解表之藥從陽分從氣分其效速而易見化毒之藥從陰分從血分其效緩而難成金鏡録養陰退陽四字治痧之要訣也養陰退陽書用四物湯余少時常習用之多不獲效以歸芎辛溫之性為不合也因制生地丹皮麥冬赤芍為痧疹四物湯節節應手古方不必盡泥師其意可也痧後潮熱最為可嫌發在午後天明退涼退時脈平靜發時脈數大唇紅舌赤而無苔咬牙揉鼻人漸瘦每多不治間有能食者大劑養陰可救一二胃為受毒之壑遺熱甚多其急莫如牙疳牙疳是失清之證必須大劑清裡若便閉者可下之使熱毒內泄與痘後同治余有勒馬飲方甚者加大黃急下之稍遲不但齒落腮穿更有唇鼻皆爛者塗藥不過幫扶而已痧後音啞者多由火甚傷金治宜甘桔牛蒡山梔之屬痧後口瘡治法同牙疳臭爛與痘後同治往年痧疹多不損目邇來有損目者其來甚速二三日間翳膜遮透即不能治緣兒本有肝熱更加郁遏或病家不知是火飲以芫荽酒遂令熱毒攻目速宜清涼養陰退陽不可再行疏散痧後咯吐膿血腥臭有肺癰者有胃癰者皆肺胃遺毒為患循經而出則為牙疳著於臟腑則為癰也治當辨其在肺在胃余用甘桔牛蒡銀花料豆枳殼赤芍數味在肺加山梔貝母桑皮在胃加生地花粉木通以佐之身無大熱者可治問牙疳肺癰可治者何也此毒已化而出也毒化而臟腑不敗者可治臟腑敗者不能治也大人出痧疹十中二三多有房室經産之患大概輕輕一散即宜養陰麻黃升麻羌活等味俱當慎用霖按葉許二君之論審證定變各有心傳真緑文赤字之書讀者當細心領會作治疹圭臬不可忽也若泥執不化率爾操觚又為二君之罪人矣吳鞠通曰若明六氣為病疹不難治但疹之限期最迫只有三日一以辛涼解透為主如俗所用防風廣皮升麻柴胡之類皆在所禁世俗見疹必表外道也大約先用辛涼清解後用甘涼收功赤疹誤用麻黃三春柳等辛溫傷肺以致喘嗽欲厥者初用辛涼加苦桔梗旋覆花上提下降甚則用白虎加旋覆花苦杏仁繼用甘涼加旋覆花以救之咳大減者去之凡小兒連咳數十聲不能回轉半日方回如水雞聲者千金葦莖湯合葶藶大棗瀉肺湯主之近世用大黃者殺之也蓋葶藶走肺經氣分雖兼走大腸然從上下降而又有大棗以載之緩之使不急於趨下大黃則純走腸胃血分下有形之滯並不走肺徒傷其無過之地故也若固執病在臟瀉其腑之法則誤矣章虛谷曰每見治疹瘄起首必用升麻葛根湯世俗相沿牢不可破雖升散其毒不為大害但止見其標不察其本或證不應藥則茫然莫知其故是以有屢用升提表散而瘄不出竟不知其臟氣怯弱不能傳送毒氣徒用表藥耗散衛氣毒更難出或本無寒邪外閉腠理而妄用麻黃大泄肺氣至於鼻煽而喘毒伏心腎煩擾不安而死醫者卒不悟其所以然良由平日認定疹出於腑及瘄毒在皮毛肌肉等説既不究胎毒發源傳化之由而見內毒不能外達者反認作外毒內陷而謂無法可治試思瘄毒如果本在肌肉初治莫不先用升提表散其瘄豈有不出之理即或有外邪內食阻滯亦必有證可辨治之何難其毒即非由臟而發則臟氣本和又用升表之藥豈有外毒內陷之事乎殊不知臟氣不能送毒傳化雖用升表無益而非外毒內陷實是內毒未出乃平素未明此理亦可慨也且起首必用升葛湯為定法則不獨未明疹瘄源流並將斑疹混而不分矣汪訒庵升葛湯歌曰斑疹已出慎勿使可見將斑疹混治已久世俗熟誦湯頭歌授受流傳以為定法更無疑議而不思升麻葛根陽明之藥也陽明主肌肉邪熱閉鬱則成斑斑者赤色成片或如錦紋捫之無形不成顆粒若未發透而用表散則宜升葛湯已發透而清裡當用白虎湯或兼內實積滯宜承氣湯至於疹瘄雖有外感風溫胎毒內發之殊然皆由心肺兩經從營出衛為血絡中病因從毛竅而出故有顆粒與斑之由陽明而發於肌肉者迥異奈何不分臟腑經絡而以治斑之藥治疹已非對證而更不明疹瘄之源流傳化欲求治法之善以愈病不亦難乎因其臟氣無虧已經送毒外出得升散之藥因勢導之而成功者多遂篤信初治必用升提表散終不自覺法之未善或遇臟氣怯弱內毒不能外達皆認作外毒內陷歸於不治也若知源流所自辨其由外感由胎毒之殊而按時透發者原可不藥而愈或不能透發則必審其所因或因外邪閉遏或因內食阻滯或因元氣怯弱或宜升散或宜通利或宜補托隨證而施則斷不可拘執先用升散為定法也豈可囿於前人之説而不準之以理乎明醫者倘不以余言為河漢或可備芻蕘之採有司命之責者胡可忽哉霖按章氏此論深明慎發表之義其案中治稟氣怯弱不能送毒外達之證於辛涼透發劑內重加玄參遇元陽不足者則涼透中稍佐附子皆有卓見較馮楚瞻之全真一氣湯精當多矣先哲論治病須辨三因察六氣愚意三因既辨六氣已包括於中痧疹伏毒為時厲感召若能詳辨其內外二因可不致操刃殺人所謂內因者命門伏藏胎毒是矣然稟賦不一未可拘牽或多實熱或本虛寒或臟氣怯弱表散太過則火盛傷金或腠理致密失於宣托則毒難外達或貪房室少陰不藏或緣病後元陽未復或為痰滯或為食積或因勞傷而蓄血或因生冷而損脾或苦寒過劑可溫補暫投或辛燥劫津而養陰難緩所謂外因者風寒暑濕燥火是矣然須先明大運之轉移後察當年司天在泉及主客氣運之偏勝惟是木火當旺或多淫雨嚴寒水土司權常見飆風燥熱亢害承製救弊補偏要未可一概論也人之稟受不同治法亦當各異宜表宜清宜攻宜補辨明所因庶免虛實寒熱之誤張石頑曰古人成法雖當參詳診切仍不能捨其繩墨臨證之機活法在乎心手而繩墨又不可拘也此千古不易之論豈獨痧疹為然哉
